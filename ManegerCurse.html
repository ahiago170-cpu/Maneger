<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Visualização Escolar</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 30px;
    }

    .sala {
      width: 200px;
      height: 200px;
      background: #ffffff;
      border: 2px solid #ccc;
      border-radius: 10px;
      padding: 10px;
      position: relative;
    }

    .sala h2 {
      font-size: 16px;
      margin-bottom: 10px;
    }

    .quadra {
      width: 440px;
      height: 150px;
      margin: 0 auto;
      background: #ffffff;
      border: 2px solid #ccc;
      border-radius: 10px;
      padding: 10px;
      position: relative;
    }

    .aluno {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      position: absolute;
    }

    .integral {
      background: #4CAF50;
    }

    .extra {
      background: #2196F3;
    }

    .info {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h1>🏫 Visualização da Escola</h1>

<div class="container">
  <div class="sala" id="integral">
    <h2>Sala Integral</h2>
  </div>

  <div class="sala" id="extra">
    <h2>Sala Extra</h2>
  </div>
</div>

<div class="quadra" id="quadra">
  <h2>Quadra</h2>
</div>

<div class="info">
  ⏰ Horário: <span id="hora"></span>
</div>

<script>
  function gerarAlunos(containerId, quantidade, tipo) {
    const container = document.getElementById(containerId);
    container.querySelectorAll('.aluno').forEach(e => e.remove());

    for (let i = 0; i < quantidade; i++) {
      const aluno = document.createElement('div');
      aluno.classList.add('aluno', tipo);

      aluno.style.left = Math.random() * 160 + "px";
      aluno.style.top = Math.random() * 120 + "px";

      container.appendChild(aluno);
    }
  }

  async function atualizar() {
  const resposta = await fetch("ManegerCurse.xlsx"); // nome do seu arquivo
  const arrayBuffer = await resposta.arrayBuffer();

  const workbook = XLSX.read(arrayBuffer, { type: "array" });
  const sheet = workbook.Sheets[workbook.SheetNames[0]];
  const dados = XLSX.utils.sheet_to_json(sheet);

  let integral = 0;
  let extra = 0;
  let quadra = 0;

  dados.forEach(linha => {
    if (linha.Local && linha.Local.includes("Integral")) integral++;
    if (linha.Turma && linha.Turma.includes("Extra")) extra++;
    if (linha.Local && linha.Local.includes("Quadra")) quadra++;
  });

  gerarAlunos("integral", integral, "integral");
  gerarAlunos("extra", extra, "extra");
  gerarAlunos("quadra", quadra, "extra");

  const agora = new Date();
  document.getElementById("hora").innerText =
    agora.getHours() + ":" + String(agora.getMinutes()).padStart(2, '0');
}

  setInterval(atualizar, 3000);
  atualizar();
</script>

</body>
</html>
