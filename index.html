<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel de Alunos - Gestão Total</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
/* --- ESTILOS GERAIS --- */
body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; background: #f0f2f5; color: #1c1e21; margin: 0; padding: 20px; }
h1 { color: #333; margin-bottom: 10px; }

.layoutPrincipal { display: flex; justify-content: center; align-items: flex-start; gap: 20px; flex-wrap: wrap; }
.filtroLateral { width: 280px; display: flex; flex-direction: column; gap: 20px; }
.conteudoDireita { flex: 1; max-width: 800px; }

/* --- CAIXAS (AREAS) --- */
.area { 
    background: white; border: 2px solid #ddd; border-radius: 12px; 
    width: 100%; height: 300px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
}
/* Aumentando a caixa de chamada conforme pedido */
.area-chamada { height: 450px; border-color: #28a745; }

.titulo { font-weight: bold; padding: 12px; background: #f8f9fa; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
.lista { height: calc(100% - 50px); overflow-y: auto; text-align: left; padding: 10px; font-size: 13px; line-height: 1.6; }

/* --- PÁTIO DE ERROS --- */
#patio { 
    margin: 20px auto; padding: 15px; max-width: 900px; 
    background: #fff5f5; border: 2px dashed #ff4d4d; border-radius: 15px; 
}
#alunosErro { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 10px; }
.alunoErro { 
    background: #ff4d4d; color: white; padding: 10px; border-radius: 8px; 
    font-size: 12px; font-weight: bold; min-width: 150px; text-align: left;
    animation: pulsar 1.5s infinite;
}
@keyframes pulsar { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
.erro-msg { display: block; font-size: 10px; background: rgba(0,0,0,0.2); padding: 2px 5px; border-radius: 4px; margin-top: 4px; }

/* --- CALENDÁRIO --- */
#calendario { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; background: white; padding: 15px; border-radius: 12px; border: 1px solid #ddd; }
.dia { border: 1px solid #eee; min-height: 70px; padding: 5px; text-align: left; background: #fafafa; border-radius: 4px; transition: 0.2s; }
.dia:hover { background: #fffceb; }
.dia h4 { margin: 0 0 5px 0; font-size: 12px; color: #888; }

/* --- BOTÕES E INPUTS --- */
button { padding: 8px 15px; border-radius: 6px; border: 1px solid #ddd; background: white; cursor: pointer; transition: 0.2s; }
button:hover { background: #e9ecef; }
.btn-confirmar { background: #28a745; color: white; border: none; width: 90%; margin: 10px auto; display: block; font-weight: bold; }
.item-chamada { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #f0f0f0; }

/* --- MODAL --- */
.modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 2000; }
.modal-conteudo { background: white; padding: 20px; border-radius: 12px; width: 350px; max-height: 500px; overflow-y: auto; position: relative; }
</style>
</head>

<body>

<h1>Painel de Alunos</h1>

<div style="margin-bottom:25px;">
  <input type="text" id="buscaNome" placeholder="🔍 Buscar por nome..." 
         style="padding:10px; width:250px; border-radius:20px; border:1px solid #ccc; outline: none;">
  <div style="margin-top: 15px;">
    <button onclick="filtrar('todos')">Todos</button>
    <button onclick="filtrar('integral')" style="border-bottom: 3px solid #b9fbc0;">Integral</button>
    <button onclick="filtrar('extra')" style="border-bottom: 3px solid #a0c4ff;">Extra</button>
    <button onclick="filtrar('quadra')" style="border-bottom: 3px solid #fff3b0;">Quadra</button>
    <button onclick="filtrar('l/c')" style="border-bottom: 3px solid #e0aaff;">L/C</button>
  </div>
</div>

<div id="patio">
  <h2>🚨 PÁTIO DE AJUSTES (Dados Incompletos)</h2>
  <div id="alunosErro"></div>
</div>

<div class="layoutPrincipal">
  <div class="filtroLateral">
    <div class="area">
      <div class="titulo">
        <span>Filtro: <span id="nomeFiltro">Todos</span></span>
        <span id="qtdFiltro" style="background:#333; color:white; padding:2px 8px; border-radius:10px; font-size:12px;">0</span>
      </div>
      <div class="lista" id="listaFiltro"></div>
    </div>

    <div class="area area-chamada">
      <div class="titulo">📋 Lista de Chamada</div>
      <div style="padding: 10px;">
          <select id="escolherCursoChamada" onchange="renderizarChamadaPorCurso()" style="width: 100%; padding: 8px; border-radius: 5px;">
              <option value="">Selecione o Curso...</option>
          </select>
      </div>
      <div class="lista" id="listaChamadaAlunos"></div>
      <button class="btn-confirmar" onclick="gerarPDFChamada()">Gerar PDF 🖨️</button>
    </div>
  </div>

  <div class="conteudoDireita">
    <div id="calendario"></div>
    <p style="font-size: 12px; color: #666;">Última sincronização: <span id="hora">--:--</span></p>
  </div>
</div>

<div id="modal" class="modal">
  <div class="modal-conteudo">
    <button style="position:absolute; right:10px; top:10px;" onclick="fecharModal()">✕</button>
    <h3 id="tituloDia"></h3>
    <div id="listaModal"></div>
  </div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbzQseSpaq3ePxcVV5dZG19HAV4AXEP9Ah0bNZV2rjNqxoOEf42kTdmyUqrbjHpRjYxn/exec";
let alunosGlobal = [];
let filtroAtual = "todos";

// --- 1º PEDIDO: LOGICA DO PATIO (VERIFICAÇÃO RIGOROSA) ---
function verificarProblemas(aluno) {
  let erros = [];
  const nome = (aluno.aluno || "").trim();
  const curso = (aluno.curso || "").trim();
  const segmento = (aluno.segmento || "").trim();
  const temData = (aluno.dia || "").trim() || (aluno.diasSemana || "").trim();
  const temHorario = (aluno.inicio || "").trim() && (aluno.fim || "").trim();

  if (!nome) erros.push("Nome ausente");
  if (!curso) erros.push("Curso ausente");
  if (!segmento) erros.push("Segmento ausente");
  if (!temData) erros.push("Sem Data/Dia");
  if (!temHorario) erros.push("Horário incompleto");

  return erros;
}

function filtrar(tipo) {
  if (tipo) filtroAtual = tipo;
  const busca = document.getElementById("buscaNome").value.toLowerCase().trim();
  
  const filtrados = alunosGlobal.filter(a => {
    // Só entra no filtro principal quem NÃO tem erro crítico
    if (verificarProblemas(a).length > 0) return false;

    const seg = (a.segmento || "").toLowerCase().trim();
    const nome = (a.aluno || "").toLowerCase().trim();
    const bateTipo = (filtroAtual === "todos") || (seg === filtroAtual);
    const bateBusca = nome.includes(busca);
    return bateTipo && bateBusca;
  });

  const listaFiltro = document.getElementById("listaFiltro");
  listaFiltro.innerHTML = filtrados.length ? "" : "<p style='color:gray; padding:10px;'>Nenhum aluno válido encontrado.</p>";
  
  filtrados.forEach(a => {
    listaFiltro.innerHTML += `<div>👤 <b>${a.aluno}</b> <br><small>${a.curso} (${a.inicio})</small></div><hr style='border:0; border-top:1px solid #eee'>`;
  });

  document.getElementById("nomeFiltro").innerText = filtroAtual.toUpperCase();
  document.getElementById("qtdFiltro").innerText = filtrados.length;

  const hoje = new Date();
  gerarCalendario(hoje.getMonth(), hoje.getFullYear(), filtrados);
}

async function atualizarPainel() {
  try {
    const resposta = await fetch(URL);
    alunosGlobal = await resposta.json();
    
    // Atualizar Pátio
    const patioContainer = document.getElementById("alunosErro");
    patioContainer.innerHTML = "";
    
    const comErro = alunosGlobal.filter(a => verificarProblemas(a).length > 0);
    comErro.forEach(a => {
        const erros = verificarProblemas(a);
        const div = document.createElement("div");
        div.className = "alunoErro";
        div.innerHTML = `
            ${a.aluno || "ALUNO SEM NOME"}
            ${erros.map(e => `<span class="erro-msg">${e}</span>`).join("")}
        `;
        patioContainer.appendChild(div);
    });

    atualizarSelectCursos();
    filtrar(); 
    
    const agora = new Date();
    document.getElementById("hora").innerText = agora.getHours().toString().padStart(2,'0') + ":" + agora.getMinutes().toString().padStart(2,'0');
  } catch (e) { console.error("Erro ao sincronizar:", e); }
}

// --- FUNÇÕES DE CHAMADA E PDF ---

function atualizarSelectCursos() {
    const select = document.getElementById("escolherCursoChamada");
    const valorSalvo = select.value;
    // Pega cursos apenas de alunos que não estão no pátio
    const cursos = [...new Set(alunosGlobal
        .filter(a => verificarProblemas(a).length === 0)
        .map(a => (a.curso || "").trim())
        .filter(c => c !== ""))];
    
    select.innerHTML = '<option value="">Selecione o Curso...</option>';
    cursos.sort().forEach(c => {
        const opt = document.createElement("option"); opt.value = c; opt.innerText = c;
        select.appendChild(opt);
    });
    select.value = valorSalvo;
}

function renderizarChamadaPorCurso() {
    const curso = document.getElementById("escolherCursoChamada").value;
    const container = document.getElementById("listaChamadaAlunos");
    container.innerHTML = curso ? "" : "<p style='color:gray; text-align:center; margin-top:20px;'>Selecione um curso para listar os alunos.</p>";
    if(!curso) return;

    alunosGlobal
        .filter(a => (a.curso || "").trim() === curso && verificarProblemas(a).length === 0)
        .sort((a,b) => a.aluno.localeCompare(b.aluno))
        .forEach(a => {
            container.innerHTML += `
                <div class="item-chamada">
                    <span>${a.aluno}</span>
                    <select class="sel-presenca" data-nome="${a.aluno}">
                        <option value="(V)">✅ (V)</option>
                        <option value="(X)">❌ (X)</option>
                    </select>
                </div>`;
        });
}

function gerarPDFChamada() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const curso = document.getElementById("escolherCursoChamada").value;
    if(!curso) return alert("Por favor, selecione um curso primeiro!");

    doc.setFontSize(16);
    doc.text(`LISTA DE CHAMADA - ${curso.toUpperCase()}`, 105, 20, { align: "center" });
    doc.setFontSize(10);
    doc.text(`Data: ${new Date().toLocaleDateString()}`, 20, 30);
    
    let y = 40;
    doc.line(20, y, 190, y);
    y += 10;

    document.querySelectorAll(".sel-presenca").forEach(sel => {
        doc.text(sel.getAttribute("data-nome"), 20, y);
        doc.text(sel.value, 170, y);
        y += 8;
        doc.line(20, y-2, 190, y-2);
        if(y > 280) { doc.addPage(); y = 20; }
    });
    doc.save(`Chamada_${curso}.pdf`);
}

// --- CALENDÁRIO ---
function gerarCalendario(mes, ano, dados) {
  const calendario = document.getElementById("calendario");
  calendario.innerHTML = "";
  const diasSemana = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
  diasSemana.forEach(d => {
    const div = document.createElement("div"); div.style.fontWeight="bold"; div.style.fontSize="12px"; div.innerText=d;
    calendario.appendChild(div);
  });

  const primeiroDia = new Date(ano, mes, 1).getDay();
  const ultimoDia = new Date(ano, mes + 1, 0).getDate();

  for (let i = 0; i < primeiroDia; i++) calendario.appendChild(document.createElement("div"));

  for (let dia = 1; dia <= ultimoDia; dia++) {
    const divDia = document.createElement("div"); divDia.className="dia";
    divDia.innerHTML = `<h4>${dia}</h4>`;

    const alunosDoDia = dados.filter(a => {
      if (a.dia && a.dia.split("-")[2] == dia) return true;
      if (a.diasSemana) {
        const map = {"DOM":0,"SEG":1,"TER":2,"QUA":3,"QUI":4,"SEX":5,"SAB":6};
        const dSem = new Date(ano, mes, dia).getDay();
        return a.diasSemana.split("-").some(d => map[d] === dSem);
      }
      return false;
    });

    if (alunosDoDia.length > 0) {
      const m = document.createElement("div"); 
      m.innerText = "🎯 " + alunosDoDia.length;
      m.style.fontSize="11px"; m.style.fontWeight="bold"; m.style.color="#d9534f";
      divDia.appendChild(m);
      divDia.onclick = () => abrirModal(dia, mes, ano, alunosDoDia);
      divDia.style.cursor = "pointer";
    }
    calendario.appendChild(divDia);
  }
}

function abrirModal(dia, mes, ano, alunos) {
  const modal = document.getElementById("modal");
  const lista = document.getElementById("listaModal");
  document.getElementById("tituloDia").innerText = `Alunos do Dia ${dia}/${mes+1}`;
  lista.innerHTML = "";
  alunos.forEach(a => {
    lista.innerHTML += `<div style="padding:8px; border-bottom:1px solid #eee"><b>${a.aluno}</b><br><small>${a.curso} | ${a.inicio}</small></div>`;
  });
  modal.style.display = "flex";
}
function fecharModal() { document.getElementById("modal").style.display = "none"; }

// Listeners
document.getElementById("buscaNome").addEventListener("input", () => filtrar());

// Início
atualizarPainel();
setInterval(atualizarPainel, 60000); // Sincroniza a cada 1 minuto
</script>

</body>
</html>
