<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel de Alunos com Calendário</title>

<style>
.topo-container {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  gap: 30px;
}

.imagem-lateral img {
  width: 250px;
  border: 2px solid #333;
  border-radius: 10px;
}
.layoutPrincipal {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  gap: 30px;
  margin-top: 20px;
}

.filtroLateral {
  width: 260px;
}

.conteudoDireita {
  flex: 1;
  max-width: 700px;
}
#patio {
  margin: 20px auto;
  padding: 15px;
  max-width: 700px;
  background: #ffe5e5;
  border: 3px dashed red;
  border-radius: 10px;
}

#alunosErro {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
}

.alunoErro {
  background: red;
  color: white;
  padding: 10px;
  border-radius: 8px;
  font-weight: bold;
  animation: pular 0.8s infinite alternate;
}

@keyframes pular {
  from { transform: translateY(0px); }
  to { transform: translateY(-10px); }
}
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-conteudo {
  background: white;
  padding: 20px;
  border-radius: 10px;
  width: 300px;
  max-height: 400px;
  overflow-y: auto;
}

.fechar {
  cursor: pointer;
  float: right;
  font-weight: bold;
}
body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
  color: #111;
}
.aluno.integral { background: #b9fbc0; }
.aluno.extra { background: #a0c4ff; }
.aluno.quadra { background: #fff3b0; }
.aluno.lc { background: #e0aaff; }

.area {
  display: inline-block;
  width: 260px;
  height: 300px;
  margin: 10px;
  border: 3px solid #333;
  border-radius: 10px;
  background: white;
  position: relative;
  vertical-align: top;
}

.titulo {
  font-weight: bold;
  padding: 5px;
  background: #eee;
}

.lista {
  height: 240px;
  overflow-y: auto;
  text-align: left;
  padding: 5px;
  font-size: 14px;
}

#calendario {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
  max-width: 700px;
  margin: 20px auto;
}

.dia {
  border: 1px solid #ccc;
  min-height: 60px;
  padding: 5px;
  text-align: left;
  background: #fdfdfd;
  position: relative;
}

.dia h4 {
  margin: 0;
  font-size: 14px;
}

.aluno {
  color: #000;
  font-weight: bold;
  border-left: 4px solid #333;
}
</style>
</head>

<body>

<h1>Painel de Alunos</h1>

<div style="margin:20px;">

  <input type="text" id="buscaNome" placeholder="🔍 Buscar aluno..." 
         style="padding:8px; width:200px; border-radius:8px; border:1px solid #ccc;">

  <br><br>

<button onclick="filtrar('todos')">Todos</button>
<button onclick="filtrar('integral')">Integral</button>
<button onclick="filtrar('extra')">Extra</button>
<button onclick="filtrar('quadra')">Quadra</button>
<button onclick="filtrar('l/c')">L/C</button>

</div>
<p>Atualizado: <span id="hora"></span></p>

<div class="layoutPrincipal">

  <!-- FILTRO NA ESQUERDA -->
  <div class="filtroLateral">
    <div class="area">
  <div class="titulo" id="tituloFiltro">
  Filtro: <span id="nomeFiltro">Todos</span> 
  (<span id="qtdFiltro">0</span>)
</div>
      <div class="lista" id="listaFiltro"></div>
    </div>
  </div>

  <!-- CONTEÚDO DIREITA -->
  <div class="conteudoDireita">
   <div class="topo-container">

  <div id="calendario"></div>

  <div class="imagem-lateral">
    <img src="tabela.png" alt="Tabela de Segmentos">
  </div>

</div>
  </div>

</div>

<div id="patio">
  <h2>🚨 PÁTIO (Alunos com problema)</h2>
  <div id="alunosErro"></div>
</div>
  
<div id="modal" class="modal">
  <div class="modal-conteudo">
    <span class="fechar" onclick="fecharModal()">X</span>
    <h3 id="tituloDia"></h3>
    <div id="listaModal"></div>
  </div>
</div> 

  
<div class="area">
  <div class="titulo">Integral</div>
  <div class="lista" id="listaIntegral"></div>
</div>


<div class="area">
  <div class="titulo">Extra</div>
  <div class="lista" id="listaExtra"></div>
</div>

<div class="area">
  <div class="titulo">Quadra</div>
  <div class="lista" id="listaQuadra"></div>
</div>

<div class="area">
  <div class="titulo">Lição de Casa</div>
  <div class="lista" id="listaLC"></div>
</div>

<div class="area">
  <div class="titulo">(Mês/dia)Curso</div>
  <div class="lista" id="listaDia"></div>
</div>

<div class="area">
  <div class="titulo">Resumo Geral</div>
  <div class="lista" id="resumo"></div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbzQseSpaq3ePxcVV5dZG19HAV4AXEP9Ah0bNZV2rjNqxoOEf42kTdmyUqrbjHpRjYxn/exec"; // coloque aqui a URL da sua API
let alunosGlobal = [];
let filtroAtual = "todos";
//oque  tem de errado com o aluno
function limpar(valor){
  if(valor === null || valor === undefined) return "";
  return String(valor).trim();
}

function verificarProblemas(aluno) {
  let erros = [];

  const curso = (aluno.curso || "").trim();
  const segmento = (aluno.segmento || "").trim();
  const dia = (aluno.dia || "").trim();
  const diasSemana = (aluno.diasSemana || "").trim();
  const inicio = (aluno.inicio || "").toString().trim();
  const fim = (aluno.fim || "").toString().trim();

  if (!curso) erros.push("❌ Curso");
  if (!segmento) erros.push("❌ Segmento");

  // 🔥 AGORA QUALQUER FALTA É ERRO
  if (!dia) erros.push("📅 Sem data");
  if (!diasSemana) erros.push("📆 Sem semana");

  if (!inicio || !fim) erros.push("⏰ Sem horário");

  return erros;
}
// LIMPAR HORA

  
function limparHora(h){
  if(!h) return "";
  return String(h).substring(0,5);
}


// ATUALIZAR PAINEL
async function atualizarPainel() {
  try {
    const resposta = await fetch(URL);
    const alunos = await resposta.json();
    alunosGlobal = alunos;
    let integral = [];
    let extra = [];
    let quadra = [];
    let lc = [];
    let diaCurso = [];
  

   alunos.forEach(item => {

  const segmento = (item.segmento || "").toLowerCase();
  const nome = item.aluno || "Sem nome";
  const curso = item.curso || "";
  const inicio = limparHora(item.inicio);
  const fim = limparHora(item.fim);

  let texto = "👤 " + nome;

  if(curso) texto += " - " + curso;
  if(inicio && fim) texto += " (" + inicio + " - " + fim + ")";

  if(segmento === "integral") integral.push(texto);
  else if(segmento === "extra") extra.push(texto);
  else if(segmento === "quadra") quadra.push(texto);
  else if(segmento === "l/c") lc.push(texto);

  // 🔥 AQUI É A CORREÇÃO
  if (!item.dia && !item.diasSemana) {
    diaCurso.push("⚠️ " + nome + " (SEM DATA)");
  } else {
    diaCurso.push("👤 " + nome + (curso ? " - " + curso : "") + " (" + item.dia + ")");
  }

});

    document.getElementById("listaIntegral").innerHTML = integral.join("<br>");
    document.getElementById("listaExtra").innerHTML = extra.join("<br>");
    document.getElementById("listaQuadra").innerHTML = quadra.join("<br>");
    document.getElementById("listaLC").innerHTML = lc.join("<br>");
    document.getElementById("listaDia").innerHTML = diaCurso.join("<br>");
   //contador de alunos
    let total = alunos.length;

   let totalIntegral = 0;
   let totalExtra = 0;
   let totalQuadra = 0;
   let totalLC = 0;

alunos.forEach(item => {
  const segmento = (item.segmento || "").toLowerCase();

  if(segmento === "integral") totalIntegral++;
  else if(segmento === "extra") totalExtra++;
  else if(segmento === "quadra") totalQuadra++;
  else if(segmento === "l/c") totalLC++;

  // resto do seu código continua normal...
});
    document.getElementById("resumo").innerHTML = `
    👥 Total de alunos: <b>${total}</b><br><br>
  
    🟢 Integral: ${totalIntegral}<br>
    🔵 Extra: ${totalExtra}<br>
    🟡 Quadra: ${totalQuadra}<br>
    🟣 L/C: ${totalLC}<br><br>

    📊 Status: Sistema organizado ✔
`;
    // ===== PÁTIO =====
let alunosComErro = alunos.filter(a => {
  return verificarProblemas(a).length > 0;
});

const patio = document.getElementById("alunosErro");
patio.innerHTML = "";

alunosComErro.forEach(a => {
  const div = document.createElement("div");
  div.classList.add("alunoErro");

  let erros = verificarProblemas(a);

  div.innerHTML = `
   ⚠️ <b>${a.aluno}</b><br>
  <small>${erros.join("<br>")}</small>
`;

  div.onclick = () => {
   const erros = verificarProblemas(a);

  alert(
    "Aluno: " + a.aluno + "\n\n" +
    erros.join("\n")
  );
};

  patio.appendChild(div);
});
    // relógio
    const agora = new Date();
    document.getElementById("hora").innerText =
      agora.getHours() + ":" + String(agora.getMinutes()).padStart(2,'0');

    // gerar calendário com dados da API
   const alunosFiltrados = filtrarAlunosParaCalendario();
   gerarCalendario(hoje.getMonth(), hoje.getFullYear(), alunosFiltrados);
    
  // 🔥 ATUALIZA FILTRO AUTOMATICAMENTE
  filtrar(filtroAtual);
  } catch (erro) {
    console.error("Erro API:", erro);
  }

}
function filtrar(tipo) {
   
  filtroAtual = tipo;
  const nomes = {
  "todos": "Todos",
  "integral": "Integral",
  "extra": "Extra",
  "quadra": "Quadra",
  "l/c": "L/C"
};


  
  const busca = document.getElementById("buscaNome").value.toLowerCase().trim();
  const lista = document.getElementById("listaFiltro");

  lista.innerHTML = "";

  if (!alunosGlobal || alunosGlobal.length === 0) {
    lista.innerHTML = "Carregando dados...";
    return;
  }

  let filtrados = alunosGlobal.filter(a => {

    const nome = (a.aluno || "").toLowerCase().trim();
    const segmento = (a.segmento || "").toLowerCase().trim();

    const bateBusca = nome.includes(busca);
    const bateTipo = (tipo === "todos") || (segmento === tipo);

    return bateBusca && bateTipo;
  });

  if (filtrados.length === 0) {
  lista.innerHTML = "Nenhum aluno encontrado";
} else {
  filtrados.forEach(a => {

    let texto = "👤 " + a.aluno;

    if (a.curso) texto += " - " + a.curso;

    if (a.inicio && a.fim)
      texto += " (" + a.inicio.substring(0,5) + " - " + a.fim.substring(0,5) + ")";

    lista.innerHTML += texto + "<br>";
  });
}
document.getElementById("nomeFiltro").innerText = nomes[tipo] || tipo;
document.getElementById("qtdFiltro").innerText = filtrados.length;
 
const hoje = new Date();
const alunosFiltrados = filtrarAlunosParaCalendario();
gerarCalendario(hoje.getMonth(), hoje.getFullYear(), alunosFiltrados);

}
  
function abrirModal(dia, mes, ano, alunos) {
  const modal = document.getElementById("modal");
  const lista = document.getElementById("listaModal");
  const titulo = document.getElementById("tituloDia");

  titulo.innerText = `Dia ${dia}/${mes+1}/${ano}`;
  lista.innerHTML = "";

  alunos.forEach(a => {
    const div = document.createElement("div");

    let seg = (a.segmento || "").toLowerCase().trim();
    if(seg === "l/c") seg = "lc";

    div.classList.add("aluno");
    div.classList.add(seg);

    let textoModal = a.aluno;

   if(a.curso) textoModal += " (" + a.curso + ")";

    if(a.diasSemana){
      textoModal += " - " + a.diasSemana;
  }

    div.innerText = textoModal;
    lista.appendChild(div);
  });

  modal.style.display = "flex";
}
function fecharModal() {
  document.getElementById("modal").style.display = "none";
}
  // filtrar calendario
function filtrarAlunosParaCalendario() {

  const busca = document.getElementById("buscaNome").value.toLowerCase().trim();

  return alunosGlobal.filter(a => {

    const nome = (a.aluno || "").toLowerCase().trim();
    const segmento = (a.segmento || "").toLowerCase().trim();

    const bateBusca = nome.includes(busca);
    const bateTipo = (filtroAtual === "todos") || (segmento === filtroAtual);

    return bateBusca && bateTipo;
  });

}

// GERAR CALENDÁRIO
function gerarCalendario(mes, ano, dados) {
  const calendario = document.getElementById("calendario");
  calendario.innerHTML = "";

  const diasSemana = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];

  // Cabeçalho dias da semana
  diasSemana.forEach(d => {
    const diaCab = document.createElement("div");
    diaCab.classList.add("dia");
    diaCab.style.fontWeight = "bold";
    diaCab.innerText = d;
    calendario.appendChild(diaCab);
  });

  const primeiroDia = new Date(ano, mes, 1).getDay();
  const ultimoDia = new Date(ano, mes + 1, 0).getDate();

  // 🔥 ISSO AQUI É O QUE FALTAVA (dias vazios estilo Windows)
  for (let i = 0; i < primeiroDia; i++) {
    const vazio = document.createElement("div");
    vazio.classList.add("dia");
    vazio.style.background = "#eee";
    calendario.appendChild(vazio);
  }

  // Dias do mês
  for (let dia = 1; dia <= ultimoDia; dia++) {

    const divDia = document.createElement("div");
    divDia.classList.add("dia");
    divDia.style.cursor = "pointer";

    const h4 = document.createElement("h4");
    h4.innerText = dia;
    divDia.appendChild(h4);

    const alunosDoDia = dados.filter(a => {

      // 1️⃣ DIA FIXO (repete todo mês)
      if (a.dia) {
        const partes = a.dia.trim().split("-");
        if (partes.length === 3) {
          const diaA = Number(partes[2]);
          if (diaA === dia) return true;
        }
      }

      // 2️⃣ DIA DA SEMANA
      if (a.diasSemana) {
        const diasMap = {
          "DOM": 0, "SEG": 1, "TER": 2,
          "QUA": 3, "QUI": 4, "SEX": 5, "SAB": 6
        };

        const dataAtual = new Date(ano, mes, dia);
        const diaSemana = dataAtual.getDay();
        const diasAluno = a.diasSemana.split("-");

        return diasAluno.some(d => diasMap[d] === diaSemana);
      }

      return false;
    });

    // Clique abre modal
    divDia.onclick = () => {
      abrirModal(dia, mes, ano, alunosDoDia);
    };

    // Marcador
    if (alunosDoDia.length > 0) {
      const marcador = document.createElement("div");
      marcador.style.marginTop = "5px";
      marcador.style.fontSize = "12px";
      marcador.style.textAlign = "center";
      marcador.style.fontWeight = "bold";
      marcador.innerText = "🎯 " + alunosDoDia.length;
      divDia.appendChild(marcador);
    }

    calendario.appendChild(divDia);
  }
}

// ATUALIZA AUTOMATICAMENTE
atualizarPainel();
setInterval(atualizarPainel, 5000);
document.getElementById("buscaNome").addEventListener("input", () => {
  filtrar(filtroAtual);
});
</script>

</body>
</html>
