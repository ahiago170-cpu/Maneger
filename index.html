<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel de Alunos</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
  color: #111;
}

.area {
  display: inline-block;
  width: 260px;
  height: 250px;
  margin: 10px;
  border: 2px solid #333;
  position: relative;
  border-radius: 10px;
  background: white;
  padding-top: 20px;
}

.titulo {
  position: absolute;
  top: -20px;
  left: 10px;
  background: #f5f5f5;
  padding: 2px 5px;
  font-weight: bold;
}

.lista {
  position: absolute;
  top: 20px;
  bottom: 40px;
  left: 5px;
  right: 5px;
  overflow-y: auto;
  text-align: left;
  font-size: 13px;
}

.horarios {
  position: absolute;
  bottom: 5px;
  left: 5px;
  right: 5px;
  font-size: 12px;
  text-align: center;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>Painel de Alunos</h1>
<p>Atualizado: <span id="hora"></span></p>

<div class="area">
  <div class="titulo">Integral</div>
  <div class="lista" id="listaIntegral"></div>
  <div class="horarios" id="hIntegral"></div>
</div>

<div class="area">
  <div class="titulo">Extra</div>
  <div class="lista" id="listaExtra"></div>
  <div class="horarios" id="hExtra"></div>
</div>

<div class="area">
  <div class="titulo">Quadra</div>
  <div class="lista" id="listaQuadra"></div>
  <div class="horarios" id="hQuadra"></div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbxTnkCuxipTxDIzBHOUPQMtDIV9cwnnn8o5tRMrNlv5B7wMTr5S5Cd2e7L6oiNGZ8cU/exec";

async function atualizar() {
  try {
    const resposta = await fetch(URL);
    const dados = await resposta.json();

    let nomesIntegral = [];
    let nomesExtra = [];
    let nomesQuadra = [];

    let horariosIntegral = new Set();
    let horariosExtra = new Set();
    let horariosQuadra = new Set();

    dados.forEach(item => {
      const segmento = item.segmento;
      const nome = item.aluno;
      const inicio = item.inicio;
      const fim = item.fim;

      const horario = (inicio && fim) ? inicio + " - " + fim : "";

      if (segmento === "integral") {
        nomesIntegral.push(nome);
        if (horario) horariosIntegral.add(horario);
      }

      if (segmento === "extra") {
        nomesExtra.push(nome);
        if (horario) horariosExtra.add(horario);
      }

      if (segmento === "quadra") {
        nomesQuadra.push(nome);
        if (horario) horariosQuadra.add(horario);
      }
    });

    // MOSTRAR NOMES
    document.getElementById("listaIntegral").innerHTML =
      nomesIntegral.map(n => "• " + n).join("<br>");

    document.getElementById("listaExtra").innerHTML =
      nomesExtra.map(n => "• " + n).join("<br>");

    document.getElementById("listaQuadra").innerHTML =
      nomesQuadra.map(n => "• " + n).join("<br>");

    // MOSTRAR HORÁRIOS
    document.getElementById("hIntegral").innerHTML =
      [...horariosIntegral].join("<br>");

    document.getElementById("hExtra").innerHTML =
      [...horariosExtra].join("<br>");

    document.getElementById("hQuadra").innerHTML =
      [...horariosQuadra].join("<br>");

    // RELÓGIO
    const agora = new Date();
    document.getElementById("hora").innerText =
      agora.getHours() + ":" + String(agora.getMinutes()).padStart(2, '0');

  } catch (erro) {
    console.error("Erro API:", erro);
  }
}

setInterval(atualizar, 5000);
atualizar();
</script>

</body>
</html>
