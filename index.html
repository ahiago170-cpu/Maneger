<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel de Alunos</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
  color: #111;
}

.area {
  display: inline-block;
  width: 260px;
  height: 300px;
  margin: 10px;
  border: 2px solid #333;
  border-radius: 10px;
  background: white;
  position: relative;
}

.titulo {
  font-weight: bold;
  padding: 5px;
  background: #eee;
}

.lista {
  height: 240px;
  overflow-y: auto;
  text-align: left;
  padding: 5px;
  font-size: 14px;
}
</style>
</head>

<body>

<h1>Painel de Alunos</h1>
<p>Atualizado: <span id="hora"></span></p>

<div class="area">
  <div class="titulo">Integral</div>
  <div class="lista" id="listaIntegral"></div>
</div>

<div class="area">
  <div class="titulo">Extra</div>
  <div class="lista" id="listaExtra"></div>
</div>

<div class="area">
  <div class="titulo">Quadra</div>
  <div class="lista" id="listaQuadra"></div>
</div>
<div class="area">
  <div class="titulo">Licao</div>div>
  <div class="lista" id="listaLicao"></div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbxz6iVyOnNS_ZOZ0HspqlQXXVJQlVQJZsWiGfXQKv8TEGFS-zHoOGjDTWXagjbR6yqF/exec";

async function atualizar() {
  try {
    const resposta = await fetch(URL);
    const dados = await resposta.json();

    let integral = [];
    let extra = [];
    let quadra = [];
    let licao=[];

    dados.forEach(item => {
      const segmento = (item.segmento || "").toLowerCase().trim();
      const nome = item.aluno || "Sem nome";
      const curso = item.curso || "";
      const inicio = item.inicio;
      const fim = item.fim;

      let texto = "👤 " + nome;

      if (curso) {
        texto += " - " + curso;
      }

      if (inicio && fim) {
        texto += " (" + inicio + " - " + fim + ")";
      }

      if (segmento === "integral") {
        integral.push(texto);
      }

      if (segmento === "extra") {
        extra.push(texto);
      }

      if (segmento === "quadra") {
        quadra.push(texto);
      }
      if(segmento === "licao"){
       licao.push(texto);
      }
    });

    document.getElementById("listaIntegral").innerHTML = integral.join("<br>");
    document.getElementById("listaExtra").innerHTML = extra.join("<br>");
    document.getElementById("listaQuadra").innerHTML = quadra.join("<br>");
    document.getElementById("listaLicao").innerHTML =licao.join("<br>");

    // relógio
    const agora = new Date();
    document.getElementById("hora").innerText =
      agora.getHours() + ":" + String(agora.getMinutes()).padStart(2, '0');

  } catch (erro) {
    console.error("Erro API:", erro);
  }
}

setInterval(atualizar, 5000);
atualizar();
</script>

</body>
</html>
