<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel de Alunos</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
  color: #111;
}

.area {
  display: inline-block;
  width: 260px;
  height: 250px;
  margin: 10px;
  border: 2px solid #333;
  position: relative;
  border-radius: 10px;
  background: white;
  padding-top: 20px;
}

.titulo {
  position: absolute;
  top: -20px;
  left: 10px;
  background: #f5f5f5;
  padding: 2px 5px;
  font-weight: bold;
}

.lista {
  position: absolute;
  top: 20px;
  bottom: 40px;
  left: 5px;
  right: 5px;
  overflow-y: auto;
  text-align: left;
  font-size: 13px;
}

.horarios {
  position: absolute;
  bottom: 5px;
  left: 5px;
  right: 5px;
  font-size: 12px;
  text-align: center;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>Painel de Alunos</h1>
<p>Atualizado: <span id="hora"></span></p>

<div class="area">
  <div class="titulo">Integral</div>
  <div class="lista" id="listaIntegral"></div>
  <div class="horarios" id="hIntegral"></div>
</div>

<div class="area">
  <div class="titulo">Extra</div>
  <div class="lista" id="listaExtra"></div>
  <div class="horarios" id="hExtra"></div>
</div>

<div class="area">
  <div class="titulo">Quadra</div>
  <div class="lista" id="listaQuadra"></div>
  <div class="horarios" id="hQuadra"></div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbysFSKVqnrMYv31PzNgxqjbjKxcOGJcSVMm0OSxkrGj-oRVoQn5wi9A5iZ7vk5d8SMh/exec";

async function atualizar() {
  try {
    const resposta = await fetch(URL);
    const dados = await resposta.json();

    let nomesIntegral = [];
    let nomesExtra = [];
    let nomesQuadra = [];

    let horariosIntegral = new Set();
    let horariosExtra = new Set();
    let horariosQuadra = new Set();

    dados.forEach(item => {
  const segmento = (item.segmento || "").toLowerCase().trim();
  const nome = item.aluno || "Sem nome";
  const curso = item.curso || "";
  const inicio = item.inicio;
  const fim = item.fim;

  const horario = (inicio && fim) ? inicio + " - " + fim : "";
  const texto = horario ? "👤 " + nome + " (" + horario + ")" : "👤 " + nome;

  if (segmento.includes("integral")) {
    nomesIntegral.push(texto);
  }

  if (segmento.includes("extra")) {
    nomesExtra.push(texto);
  }

  if (segmento.includes("quadra")) {
    nomesQuadra.push(texto);
  }
});

    document.getElementById("listaIntegral").innerHTML =
      nomesIntegral.map(n => "• " + n).join("<br>");

    document.getElementById("listaExtra").innerHTML =
      nomesExtra.map(n => "• " + n).join("<br>");

    document.getElementById("listaQuadra").innerHTML =
      nomesQuadra.map(n => "• " + n).join("<br>");

    document.getElementById("hIntegral").innerHTML =
      [...horariosIntegral].join("<br>");

    document.getElementById("hExtra").innerHTML =
      [...horariosExtra].join("<br>");

    document.getElementById("hQuadra").innerHTML =
      [...horariosQuadra].join("<br>");

    const agora = new Date();
    document.getElementById("hora").innerText =
      agora.getHours() + ":" + String(agora.getMinutes()).padStart(2, '0');

  } catch (erro) {
    console.error("Erro API:", erro);
  }
}

setInterval(atualizar, 5000);
atualizar();
</script>

</body>
</html>
