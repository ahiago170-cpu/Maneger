<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel de Alunos com Calendário</title>

<style>
#patio {
  margin: 20px auto;
  padding: 15px;
  max-width: 700px;
  background: #ffe5e5;
  border: 3px dashed red;
  border-radius: 10px;
}

#alunosErro {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
}

.alunoErro {
  background: red;
  color: white;
  padding: 10px;
  border-radius: 8px;
  font-weight: bold;
  animation: pular 0.8s infinite alternate;
}

@keyframes pular {
  from { transform: translateY(0px); }
  to { transform: translateY(-10px); }
}

.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-conteudo {
  background: white;
  padding: 20px;
  border-radius: 10px;
  width: 300px;
  max-height: 400px;
  overflow-y: auto;
}

.fechar {
  cursor: pointer;
  float: right;
  font-weight: bold;
}

body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
}

.aluno.integral { background: #b9fbc0; }
.aluno.extra { background: #a0c4ff; }
.aluno.quadra { background: #fff3b0; }
.aluno.lc { background: #e0aaff; }

.area {
  display: inline-block;
  width: 260px;
  height: 300px;
  margin: 10px;
  border: 3px solid #333;
  border-radius: 10px;
  background: white;
}

.titulo {
  font-weight: bold;
  padding: 5px;
  background: #eee;
}

.lista {
  height: 240px;
  overflow-y: auto;
  text-align: left;
  padding: 5px;
}

#calendario {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
  max-width: 700px;
  margin: 20px auto;
}

.dia {
  border: 1px solid #ccc;
  min-height: 60px;
  padding: 5px;
}
</style>
</head>

<body>

<h1>Painel de Alunos</h1>
<p>Atualizado: <span id="hora"></span></p>

<div style="margin:10px;">
  <button onclick="mudarMes(-1)">⬅️</button>
  <span id="mesAtualTexto"></span>
  <button onclick="mudarMes(1)">➡️</button>
</div>

<div id="calendario"></div>

<div id="patio">
  <h2>🚨 PÁTIO (Alunos com problema)</h2>
  <div id="alunosErro"></div>
</div>

<div id="modal" class="modal">
  <div class="modal-conteudo">
    <span class="fechar" onclick="fecharModal()">X</span>
    <h3 id="tituloDia"></h3>
    <div id="listaModal"></div>
  </div>
</div>

<div class="area"><div class="titulo">Integral</div><div id="listaIntegral" class="lista"></div></div>
<div class="area"><div class="titulo">Extra</div><div id="listaExtra" class="lista"></div></div>
<div class="area"><div class="titulo">Quadra</div><div id="listaQuadra" class="lista"></div></div>
<div class="area"><div class="titulo">Lição de Casa</div><div id="listaLC" class="lista"></div></div>
<div class="area"><div class="titulo">(Mês/dia)Curso</div><div id="listaDia" class="lista"></div></div>
<div class="area"><div class="titulo">Resumo Geral</div><div id="resumo" class="lista"></div></div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbzQseSpaq3ePxcVV5dZG19HAV4AXEP9Ah0bNZV2rjNqxoOEf42kTdmyUqrbjHpRjYxn/exec";

let mesAtual = new Date().getMonth();
let anoAtual = new Date().getFullYear();
let alunosGlobal = [];

function mudarMes(valor){
  mesAtual += valor;

  if(mesAtual < 0){ mesAtual = 11; anoAtual--; }
  if(mesAtual > 11){ mesAtual = 0; anoAtual++; }

  atualizarTextoMes();
  gerarCalendario(mesAtual, anoAtual, alunosGlobal);
}

function atualizarTextoMes(){
  const nomesMeses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  document.getElementById("mesAtualTexto").innerText = nomesMeses[mesAtual] + " / " + anoAtual;
}

function verificarProblemas(a){
  let erros=[];
  if(!a.curso) erros.push("Curso vazio");
  if(!a.segmento) erros.push("Segmento vazio");
  if(!a.dia && !a.diasSemana) erros.push("Sem data");
  if(!a.inicio || !a.fim) erros.push("Horario incompleto");
  return erros;
}

function limparHora(h){
  return h ? String(h).substring(0,5) : "";
}

async function atualizarPainel(){
  const res = await fetch(URL);
  const alunos = await res.json();

  alunosGlobal = alunos;

  let integral=[],extra=[],quadra=[],lc=[],diaCurso=[];

  alunos.forEach(a=>{
    let texto="👤 "+a.aluno;
    if(a.curso) texto+=" - "+a.curso;
    if(a.inicio && a.fim) texto+=" ("+a.inicio+"-"+a.fim+")";

    if(a.segmento==="integral") integral.push(texto);
    else if(a.segmento==="extra") extra.push(texto);
    else if(a.segmento==="quadra") quadra.push(texto);
    else if(a.segmento==="l/c") lc.push(texto);

    diaCurso.push(texto+" ("+a.dia+")");
  });

  listaIntegral.innerHTML=integral.join("<br>");
  listaExtra.innerHTML=extra.join("<br>");
  listaQuadra.innerHTML=quadra.join("<br>");
  listaLC.innerHTML=lc.join("<br>");
  listaDia.innerHTML=diaCurso.join("<br>");

  // patio erro
  alunosErro.innerHTML="";
  alunos.filter(a=>verificarProblemas(a).length>0).forEach(a=>{
    let div=document.createElement("div");
    div.className="alunoErro";
    div.innerText=a.aluno;
    div.onclick=()=>alert(verificarProblemas(a).join("\n"));
    alunosErro.appendChild(div);
  });

  atualizarTextoMes();
  gerarCalendario(mesAtual, anoAtual, alunosGlobal);
}

function gerarCalendario(mes,ano,dados){
  calendario.innerHTML="";

  ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"].forEach(d=>{
    let div=document.createElement("div");
    div.innerText=d;
    calendario.appendChild(div);
  });

  let diasMes=new Date(ano,mes+1,0).getDate();

  for(let dia=1;dia<=diasMes;dia++){
    let div=document.createElement("div");
    div.className="dia";
    div.innerHTML="<b>"+dia+"</b>";

    let lista=dados.filter(a=>{
      if(a.dia){
        let d=a.dia.split("-");
        if(Number(d[2])===dia) return true;
      }
      return false;
    });

    if(lista.length){
      div.innerHTML+="<br>🎯 "+lista.length;
      div.onclick=()=>alert(lista.map(a=>a.aluno).join("\n"));
    }

    calendario.appendChild(div);
  }
}

atualizarPainel();
setInterval(atualizarPainel,5000);
</script>

</body>
</html>
