<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel de Alunos - Relatórios Diretos</title>
<style>
    /* SEU LAYOUT ORIGINAL */
    body { font-family: Arial, sans-serif; text-align: center; background: #f5f5f5; color: #111; }
    .layoutPrincipal { display: flex; justify-content: center; align-items: flex-start; gap: 30px; margin-top: 20px; }
    .area { display: inline-block; width: 260px; height: 320px; margin: 10px; border: 3px solid #333; border-radius: 10px; background: white; vertical-align: top; overflow: hidden; }
    .area-chamada { height: 450px; width: 300px; }
    .titulo { font-weight: bold; padding: 10px; background: #eee; border-bottom: 1px solid #ccc; }
    .lista { height: 250px; overflow-y: auto; text-align: left; padding: 10px; font-size: 14px; }
    #listaChamadaAlunos { height: 300px; }
    
    /* PÁTIO */
    #patio { margin: 20px auto; padding: 15px; max-width: 700px; background: #ffe5e5; border: 3px dashed red; border-radius: 10px; }
    .alunoErro { background: red; color: white; padding: 8px; border-radius: 8px; margin: 5px; font-weight: bold; font-size: 12px; display: inline-block; text-align: left; }
    .alunoErro small { display: block; font-weight: normal; font-size: 10px; opacity: 0.9; }

    /* CHAMADA */
    .item-chamada { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding: 5px 0; }
    .sel-presenca { padding: 2px; border-radius: 4px; border: 1px solid #ccc; }
    .btn-salvar { background: #28a745; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 90%; margin-top: 10px; transition: 0.3s; }
    .btn-salvar:hover { background: #218838; }
    .btn-salvar:disabled { background: #ccc; cursor: not-allowed; }
</style>
</head>
<body>

<h1>Painel de Gestão de Alunos</h1>

<div id="patio">
    <h3>🚨 PÁTIO (Dados Incompletos)</h3>
    <div id="alunosErro"></div>
</div>

<div class="layoutPrincipal">
    <div class="area area-chamada">
        <div class="titulo">📋 Chamada por Curso</div>
        <select id="escolherCurso" onchange="gerarListaParaChamada()" style="width: 90%; margin: 10px; padding: 5px;">
            <option value="">Selecione o Curso...</option>
        </select>
        <div class="lista" id="listaChamadaAlunos"></div>
        <button id="btnSalvar" class="btn-salvar" onclick="salvarRelatorioNoSheets()">Confirmar e Salvar no Sheets 📊</button>
    </div>

    <div class="area">
        <div class="titulo">Alunos por Segmento</div>
        <div class="lista" id="listaResumo"></div>
    </div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbxm2ULObj6Dq87QBoRrq9Wzj6x1u2itB_5y39hos9cRi3ncQJnxl4zu9Kt8UAGPY-vQ/exec"; // <--- COLOQUE SUA URL AQUI
let alunosGlobal = [];

async function atualizarPainel() {
    try {
        const resposta = await fetch(URL);
        alunosGlobal = await resposta.json();
        
        // Atualiza Cursos no Select
        const select = document.getElementById("escolherCurso");
        const cursos = [...new Set(alunosGlobal.map(a => a.curso).filter(c => c))].sort();
        select.innerHTML = '<option value="">Selecione o Curso...</option>';
        cursos.forEach(c => select.innerHTML += `<option value="${c}">${c}</option>`);

        // Atualiza Pátio (Erros Visíveis)
        const patio = document.getElementById("alunosErro");
        patio.innerHTML = "";
        alunosGlobal.forEach(a => {
            let erros = [];
            if (!a.segmento) erros.push("Falta Segmento");
            if (!a.inicio) erros.push("Falta Horário");
            
            if (erros.length > 0) {
                patio.innerHTML += `<div class="alunoErro">⚠️ ${a.aluno} <small>${erros.join(" | ")}</small></div>`;
            }
        });

    } catch (e) { console.error("Erro ao carregar dados:", e); }
}

function gerarListaParaChamada() {
    const curso = document.getElementById("escolherCurso").value;
    const lista = document.getElementById("listaChamadaAlunos");
    lista.innerHTML = "";
    if (!curso) return;

    alunosGlobal.filter(a => a.curso === curso).forEach(a => {
        lista.innerHTML += `
            <div class="item-chamada">
                <span>${a.aluno}</span>
                <select class="sel-presenca" data-aluno="${a.aluno}" data-segmento="${a.segmento}">
                    <option value="PRESENTE">✅</option>
                    <option value="FALTA">❌</option>
                </select>
            </div>`;
    });
}

// ESTA É A FUNÇÃO QUE ENVIA PARA A ABA "RELATÓRIOS"
async function salvarRelatorioNoSheets() {
    const curso = document.getElementById("escolherCurso").value;
    const btn = document.getElementById("btnSalvar");
    const inputs = document.querySelectorAll(".sel-presenca");

    if (!curso || inputs.length === 0) return alert("Selecione um curso com alunos!");

    btn.innerText = "⏳ Salvando...";
    btn.disabled = true;

    const dataHoje = new Date().toLocaleDateString('pt-BR');
    let dadosParaEnviar = [];

    inputs.forEach(sel => {
        dadosParaEnviar.push({
            nome: sel.getAttribute("data-aluno"),
            segmento: sel.getAttribute("data-segmento"),
            presenca: sel.value,
            data: dataHoje
        });
    });

    try {
        const response = await fetch(URL, {
            method: 'POST',
            body: JSON.stringify({ alunos: dadosParaEnviar })
        });
        const resultado = await response.text();
        alert(resultado); // Vai mostrar "✅ Relatório enviado com sucesso!"
        
        // Limpa a tela após sucesso
        document.getElementById("listaChamadaAlunos").innerHTML = "";
        document.getElementById("escolherCurso").value = "";
    } catch (e) {
        alert("Erro de conexão com o servidor.");
    } finally {
        btn.innerText = "Confirmar e Salvar no Sheets 📊";
        btn.disabled = false;
    }
}

atualizarPainel();
</script>
</body>
</html>
