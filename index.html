<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel de Alunos</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #111;
  color: white;
}

.area {
  display: inline-block;
  width: 220px;
  height: 180px;
  margin: 10px;
  border: 2px solid #fff;
  position: relative;
  border-radius: 10px;
}

.titulo {
  position: absolute;
  top: -20px;
  left: 10px;
  background: #111;
  padding: 2px 5px;
}

.aluno {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  position: absolute;
}

.integral { background: #00ff88; }
.extra { background: #ffaa00; }

.horarios {
  position: absolute;
  bottom: 5px;
  left: 5px;
  right: 5px;
  font-size: 10px;
  text-align: left;
}
</style>
</head>

<body>

<h1>Painel de Alunos</h1>
<p>Atualizado: <span id="hora"></span></p>

<div class="area" id="integral">
  <div class="titulo">Integral</div>
  <div class="horarios" id="hIntegral"></div>
</div>

<div class="area" id="extra">
  <div class="titulo">Extra</div>
  <div class="horarios" id="hExtra"></div>
</div>

<div class="area" id="quadra">
  <div class="titulo">Quadra</div>
  <div class="horarios" id="hQuadra"></div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbwy9dZLj2DgqANdGgrI5YbUhfZkgRY_F3vegXDr1MWSSUrxqJrKhiDV2_RJQi4Ub9_r/exec";

function gerarAlunos(containerId, quantidade, tipo) {
  const container = document.getElementById(containerId);
  container.querySelectorAll('.aluno').forEach(e => e.remove());

  for (let i = 0; i < quantidade; i++) {
    const aluno = document.createElement('div');
    aluno.classList.add('aluno', tipo);

    aluno.style.left = Math.random() * 180 + "px";
    aluno.style.top = Math.random() * 120 + "px";

    container.appendChild(aluno);
  }
}

async function atualizar() {
  try {
    const resposta = await fetch(URL);
    const dados = await resposta.json();

    let integral = 0;
    let extra = 0;
    let quadra = 0;

    let horariosIntegral = new Set();
    let horariosExtra = new Set();
    let horariosQuadra = new Set();

    dados.forEach(item => {
      const turma = (item.turma || "").toLowerCase().trim();
      const curso = (item.curso || "").toLowerCase().trim();
      const sala  = (item.sala || "").toLowerCase().trim();
      const horario = item.horario;

      if (curso.includes("integral") || turma.includes("integral")) {
        integral++;
        horariosIntegral.add(horario);
      }

      if (turma.includes("extra")) {
        extra++;
        horariosExtra.add(horario);
      }

      if (sala.includes("quadra")) {
        quadra++;
        horariosQuadra.add(horario);
      }
    });

    gerarAlunos("integral", integral, "integral");
    gerarAlunos("extra", extra, "extra");
    gerarAlunos("quadra", quadra, "extra");

    // mostrar horários
    document.getElementById("hIntegral").innerText =
      "Horários: " + [...horariosIntegral].join(", ");

    document.getElementById("hExtra").innerText =
      "Horários: " + [...horariosExtra].join(", ");

    document.getElementById("hQuadra").innerText =
      "Horários: " + [...horariosQuadra].join(", ");

    // hora atual
    const agora = new Date();
    document.getElementById("hora").innerText =
      agora.getHours() + ":" + String(agora.getMinutes()).padStart(2, '0');

  } catch (erro) {
    console.error("Erro API:", erro);
  }
}

setInterval(atualizar, 5000);
atualizar();
</script>

</body>
</html>
