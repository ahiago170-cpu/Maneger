<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel de Alunos com Calendário</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
/* SEU ESTILO ORIGINAL MANTIDO */
.topo-container { display: flex; justify-content: center; align-items: flex-start; gap: 30px; }
.imagem-lateral img { width: 250px; border: 2px solid #333; border-radius: 10px; }
.layoutPrincipal { display: flex; justify-content: center; align-items: flex-start; gap: 30px; margin-top: 20px; }
.filtroLateral { width: 260px; }
.conteudoDireita { flex: 1; max-width: 700px; }

#patio {
  margin: 20px auto; padding: 15px; max-width: 700px;
  background: #ffe5e5; border: 3px dashed red; border-radius: 10px;
}
#alunosErro { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
.alunoErro {
  background: red; color: white; padding: 10px; border-radius: 8px;
  font-weight: bold; cursor: pointer; animation: pular 0.8s infinite alternate;
  text-align: left; min-width: 120px;
}
.alunoErro small { display: block; font-weight: normal; font-size: 10px; margin-top: 4px; line-height: 1.1; }

@keyframes pular { from { transform: translateY(0px); } to { transform: translateY(-10px); } }

.modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1000; }
.modal-conteudo { background: white; padding: 20px; border-radius: 10px; width: 300px; max-height: 400px; overflow-y: auto; }
.fechar { cursor: pointer; float: right; font-weight: bold; }

body { font-family: Arial; text-align: center; background: #f5f5f5; color: #111; }
.aluno.integral { background: #b9fbc0; }
.aluno.extra { background: #a0c4ff; }
.aluno.quadra { background: #fff3b0; }
.aluno.lc { background: #e0aaff; }

.area {
  display: inline-block; width: 260px; height: 300px; margin: 10px;
  border: 3px solid #333; border-radius: 10px; background: white;
  position: relative; vertical-align: top;
}
.area-chamada { height: 400px; } 

.titulo { font-weight: bold; padding: 5px; background: #eee; }
.lista { height: 240px; overflow-y: auto; text-align: left; padding: 5px; font-size: 14px; }
#listaChamadaAlunos { height: 250px; }

#calendario { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; max-width: 700px; margin: 20px auto; }
.dia { border: 1px solid #ccc; min-height: 60px; padding: 5px; text-align: left; background: #fdfdfd; position: relative; }
.dia h4 { margin: 0; font-size: 14px; }
.aluno { color: #000; font-weight: bold; border-left: 4px solid #333; }

.item-chamada { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 3px 0; }
.sel-presenca { font-size: 12px; }
.btn-pdf { background: #28a745; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 90%; margin-top: 10px; }
</style>
</head>

<body>

<h1>Painel de Alunos</h1>

<div style="margin:20px;">
  <input type="text" id="buscaNome" placeholder="🔍 Buscar aluno..." 
         style="padding:8px; width:200px; border-radius:8px; border:1px solid #ccc;">
  <br><br>
  <button onclick="filtrar('todos')">Todos</button>
  <button onclick="filtrar('integral')">Integral</button>
  <button onclick="filtrar('extra')">Extra</button>
  <button onclick="filtrar('quadra')">Quadra</button>
  <button onclick="filtrar('l/c')">L/C</button>
</div>

<p>Atualizado: <span id="hora"></span></p>

<div class="layoutPrincipal">
  <div class="filtroLateral">
    <div class="area">
      <div class="titulo" id="tituloFiltro">
        Filtro: <span id="nomeFiltro">Todos</span> (<span id="qtdFiltro">0</span>)
      </div>
      <div class="lista" id="listaFiltro"></div>
    </div>

    <div class="area area-chamada">
      <div class="titulo">📋 Lista de Chamada</div>
      <select id="escolherCurso" onchange="gerarListaParaChamada()" style="width: 90%; margin: 5px;">
          <option value="">Escolha o curso...</option>
      </select>
      <div class="lista" id="listaChamadaAlunos"></div>
      <button id="btnSalvar" class="btn-pdf" onclick="salvarRelatorioNoSheets()">Confirmar e Salvar no Sheets 📊</button>
    </div>
  </div>

  <div class="conteudoDireita">
    <div class="topo-container">
      <div id="calendario"></div>
      <div class="imagem-lateral">
        <img src="tabela.png" alt="Tabela de Segmentos">
      </div>
    </div>
  </div>
</div>

<div id="patio">
  <h2>🚨 PÁTIO (Alunos com problema)</h2>
  <div id="alunosErro"></div>
</div>

<div class="area"><div class="titulo">Integral</div><div class="lista" id="listaIntegral"></div></div>
<div class="area"><div class="titulo">Extra</div><div class="lista" id="listaExtra"></div></div>
<div class="area"><div class="titulo">Quadra</div><div class="lista" id="listaQuadra"></div></div>
<div class="area"><div class="titulo">Lição de Casa</div><div class="lista" id="listaLC"></div></div>
<div class="area"><div class="titulo">(Mês/dia)Curso</div><div class="lista" id="listaDia"></div></div>
<div class="area"><div class="titulo">Resumo Geral</div><div class="lista" id="resumo"></div></div>

<div id="modal" class="modal">
  <div class="modal-conteudo">
    <span class="fechar" onclick="fecharModal()">X</span>
    <h3 id="tituloDia"></h3>
    <div id="listaModal"></div>
  </div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbxxuKDrxpWZ4B89DPdGicYYGhedOz0qUHYNJmH5ISZbAVvzqr2tEQ3iEeB65XkDaIK_/exec";
let alunosGlobal = [];
let filtroAtual = "todos";

function verificarProblemas(aluno) {
  let erros = [];
  if (!aluno.aluno) erros.push("❌ Nome");
  if (!aluno.curso) erros.push("❌ Curso");
  if (!aluno.segmento) erros.push("❌ Segmento");
  if (!aluno.dia && !aluno.diasSemana) erros.push("📅 Data/Semana");
  if (!aluno.inicio || !aluno.fim) erros.push("⏰ Horário");
  return erros;
}

async function atualizarPainel() {
  try {
    const resposta = await fetch(URL);
    alunosGlobal = await resposta.json();
    
    const patio = document.getElementById("alunosErro");
    patio.innerHTML = "";
    alunosGlobal.filter(a => verificarProblemas(a).length > 0).forEach(a => {
      const erros = verificarProblemas(a);
      const div = document.createElement("div");
      div.className = "alunoErro";
      div.innerHTML = `⚠️ ${a.aluno || "Sem Nome"} <small>${erros.join("<br>")}</small>`;
      div.onclick = () => alert("Aluno: " + (a.aluno || "Sem Nome") + "\nDetalhes:\n" + erros.join("\n"));
      patio.appendChild(div);
    });

    const select = document.getElementById("escolherCurso");
    const valorAntigo = select.value;
    const cursos = [...new Set(alunosGlobal.map(a => a.curso).filter(c => c))];
    select.innerHTML = '<option value="">Escolha o curso...</option>';
    cursos.sort().forEach(c => select.innerHTML += `<option value="${c}">${c}</option>`);
    select.value = valorAntigo;

    renderizarCaixasSegmentos();
    filtrar(filtroAtual);

    const agora = new Date();
    document.getElementById("hora").innerText = agora.getHours() + ":" + String(agora.getMinutes()).padStart(2,'0');
  } catch (e) { console.error(e); }
}

function renderizarCaixasSegmentos() {
    let int = [], ext = [], qua = [], lc = [], diaC = [];
    let totalErros = 0;

    alunosGlobal.forEach(item => {
        if (verificarProblemas(item).length > 0) totalErros++;

        let seg = (item.segmento || "").toLowerCase();
        let alunoNome = item.aluno || "Sem Nome";
        let curso = item.curso || "S/C";
        let prof = item.prof || "Sem Professor";
        let inicio = item.inicio ? item.inicio.substring(0,5) : "--:--";
        let fim = item.fim ? item.fim.substring(0,5) : "--:--";

        // CAMPOS 1, 2, 3 e 4 (Alunos + Inicio/Fim + Curso + Professor)
        let txtComum = `
            <div style="margin-bottom: 8px; border-bottom: 1px dashed #ccc; padding-bottom: 4px;">
                👤 <b>${alunoNome}</b> (${inicio} - ${fim})<br>
                📘 ${curso} | 👨‍🏫 <b>${prof}</b>
            </div>`;

        if(seg === "integral") int.push(txtComum);
        else if(seg === "extra") ext.push(txtComum);
        else if(seg === "quadra") qua.push(txtComum);
        else if(seg === "l/c") lc.push(txtComum);
        
        // CAMPO 5 (Aluno + Dia + Curso + Professor)
        let dataTexto = "Sem data";
        if (item.dia) {
            // Tenta formatar se vier no padrão 2026-03-12 ou 12-03-2026
            let partes = item.dia.split("-");
            if(partes.length === 3) {
                // Se o primeiro item tiver 4 digitos é YYYY-MM-DD
                dataTexto = partes[0].length === 4 ? `${partes[2]}/${partes[1]}` : `${partes[0]}/${partes[1]}`;
            } else {
                dataTexto = item.dia;
            }
        } else if (item.diasSemana) {
            dataTexto = item.diasSemana;
        }

        let txtDia = `
            <div style="margin-bottom: 8px; border-bottom: 1px dashed #ccc; padding-bottom: 4px;">
                👤 <b>${alunoNome}</b> | 📅 <b>${dataTexto}</b><br>
                📘 ${curso} | 👨‍🏫 ${prof}
            </div>`;
        diaC.push(txtDia);
    });
    
    document.getElementById("listaIntegral").innerHTML = int.join("");
    document.getElementById("listaExtra").innerHTML = ext.join("");
    document.getElementById("listaQuadra").innerHTML = qua.join("");
    document.getElementById("listaLC").innerHTML = lc.join("");
    document.getElementById("listaDia").innerHTML = diaC.join("");
    
    // CAMPO 6
    document.getElementById("resumo").innerHTML = `
        <div style="text-align:left; font-size:14px;">
            Total Alunos: ${alunosGlobal.length}<br>
            Integral: ${int.length} | Extra: ${ext.length}<br>
            Quadra: ${qua.length} | L/C: ${lc.length}<br>
            <strong style="color:red;">🚨 Erros no Pátio: ${totalErros}</strong>
        </div>`;
}

function filtrar(tipo) {
  filtroAtual = tipo;
  const busca = document.getElementById("buscaNome").value.toLowerCase();
  const listaFiltro = document.getElementById("listaFiltro");
  listaFiltro.innerHTML = "";

  const filtrados = alunosGlobal.filter(a => {
    const bateTipo = (tipo === "todos") || ((a.segmento || "").toLowerCase() === tipo);
    const bateBusca = (a.aluno || "").toLowerCase().includes(busca);
    return bateTipo && bateBusca;
  });

  filtrados.forEach(a => listaFiltro.innerHTML += `👤 ${a.aluno} (${a.curso || ''})<br>`);
  document.getElementById("nomeFiltro").innerText = tipo.toUpperCase();
  document.getElementById("qtdFiltro").innerText = filtrados.length;

  const hoje = new Date();
  gerarCalendario(hoje.getMonth(), hoje.getFullYear(), filtrados);
}

function gerarListaParaChamada() {
    const curso = document.getElementById("escolherCurso").value;
    const container = document.getElementById("listaChamadaAlunos");
    container.innerHTML = "";
    if(!curso) return;

    alunosGlobal.filter(a => a.curso === curso).sort((a,b) => a.aluno.localeCompare(b.aluno)).forEach(a => {
        container.innerHTML += `
            <div class="item-chamada">
                <span>${a.aluno}</span>
                <select class="sel-presenca" data-aluno="${a.aluno}">
                    <option value="(V)">✅ (V)</option>
                    <option value="(X)">❌ (X)</option>
                </select>
            </div>`;
    });
}

async function salvarRelatorioNoSheets() {
    const curso = document.getElementById("escolherCurso").value;
    const btn = document.getElementById("btnSalvar");
    if(!curso) return alert("Selecione um curso para fazer a chamada!");

    btn.innerText = "⏳ Gravando...";
    btn.disabled = true;

    const dataHoje = new Date().toLocaleDateString();
    let dadosParaEnviar = [];

    document.querySelectorAll(".sel-presenca").forEach(select => {
        const nome = select.getAttribute("data-aluno");
        const presenca = select.value;
        const info = alunosGlobal.find(a => a.aluno === nome) || {};

        dadosParaEnviar.push({
            nome: nome,
            segmento: info.segmento || "",
            presenca: presenca,
            data: dataHoje
        });
    });

    try {
        const response = await fetch(URL, {
            method: 'POST',
            body: JSON.stringify({ alunos: dadosParaEnviar })
        });
        const texto = await response.text();
        alert(texto);
    } catch (e) {
        alert("Erro ao conectar.");
    } finally {
        btn.innerText = "Confirmar e Salvar no Sheets 📊";
        btn.disabled = false;
    }
}

function gerarCalendario(mes, ano, dados) {
  const calendario = document.getElementById("calendario");
  calendario.innerHTML = "";
  const diasSemana = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
  diasSemana.forEach(d => {
    const div = document.createElement("div"); div.className="dia"; div.style.fontWeight="bold"; div.innerText=d;
    calendario.appendChild(div);
  });

  const primeiroDia = new Date(ano, mes, 1).getDay();
  const ultimoDia = new Date(ano, mes + 1, 0).getDate();

  for (let i = 0; i < primeiroDia; i++) {
    const v = document.createElement("div"); v.className="dia"; v.style.background="#eee";
    calendario.appendChild(v);
  }

  for (let dia = 1; dia <= ultimoDia; dia++) {
    const divDia = document.createElement("div"); divDia.className="dia";
    divDia.innerHTML = `<h4>${dia}</h4>`;
    const alunosDoDia = dados.filter(a => {
      if (a.dia && a.dia.includes(String(dia).padStart(2,'0'))) return true;
      if (a.diasSemana) {
        const dSem = new Date(ano, mes, dia).getDay();
        const map = {"DOM":0,"SEG":1,"TER":2,"QUA":3,"QUI":4,"SEX":5,"SAB":6};
        return a.diasSemana.split("-").some(d => map[d] === dSem);
      }
      return false;
    });

    if (alunosDoDia.length > 0) {
      const m = document.createElement("div"); m.innerText = "🎯 " + alunosDoDia.length;
      m.style.fontSize="10px"; m.style.fontWeight="bold"; divDia.appendChild(m);
      divDia.onclick = () => abrirModal(dia, mes, ano, alunosDoDia);
      divDia.style.cursor = "pointer";
    }
    calendario.appendChild(divDia);
  }
}

function abrirModal(dia, mes, ano, alunos) {
  document.getElementById("tituloDia").innerText = `Dia ${dia}/${mes+1}`;
  const lista = document.getElementById("listaModal");
  lista.innerHTML = "";
  alunos.forEach(a => {
    const div = document.createElement("div"); div.className="aluno " + (a.segmento||"").toLowerCase().replace("/","");
    div.innerText = a.aluno + " (" + (a.curso||"") + ")";
    lista.appendChild(div);
  });
  document.getElementById("modal").style.display = "flex";
}
function fecharModal() { document.getElementById("modal").style.display = "none"; }

document.getElementById("buscaNome").addEventListener("input", () => filtrar(filtroAtual));
atualizarPainel();
setInterval(atualizarPainel, 30000);
</script>

</body>
</html>
