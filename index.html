<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel de Alunos com Calendário</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
/* Estilo dos botões de Turma (Nichos) */
.btn-nicho-turma {
    background: #333;
    color: white;
    border: none;
    padding: 5px 8px;
    border-radius: 4px;
    font-size: 11px;
    cursor: pointer;
    font-weight: bold;
}
.btn-nicho-turma:hover { background: #555; }
.btn-nicho-turma.ativo { background: #28a745; }

/* ESTILOS MANTIDOS */
.topo-container { display: flex; justify-content: center; align-items: flex-start; gap: 30px; }
.imagem-lateral img { width: 250px; border: 2px solid #333; border-radius: 10px; }
.layoutPrincipal { display: flex; justify-content: center; align-items: flex-start; gap: 30px; margin-top: 20px; }
.filtroLateral { width: 260px; }
.conteudoDireita { flex: 1; max-width: 700px; }

#patio {
  margin: 20px auto; padding: 15px; max-width: 700px;
  background: #ffe5e5; border: 3px dashed red; border-radius: 10px;
}
#alunosErro { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
.alunoErro {
  background: red; color: white; padding: 10px; border-radius: 8px;
  font-weight: bold; cursor: pointer; animation: pular 0.8s infinite alternate;
  text-align: left; min-width: 120px;
}
.alunoErro small { display: block; font-weight: normal; font-size: 10px; margin-top: 4px; line-height: 1.1; }

@keyframes pular { from { transform: translateY(0px); } to { transform: translateY(-10px); } }

.modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1000; }
.modal-conteudo { background: white; padding: 20px; border-radius: 10px; width: 300px; max-height: 400px; overflow-y: auto; }
.fechar { cursor: pointer; float: right; font-weight: bold; }

body { font-family: Arial; text-align: center; background: #f5f5f5; color: #111; }

.area {
  display: inline-block; width: 260px; height: 300px; margin: 10px;
  border: 3px solid #333; border-radius: 10px; background: white;
  position: relative; vertical-align: top;
}

.area-chamada { height: 430px; } 

.titulo { font-weight: bold; padding: 5px; background: #eee; text-transform: capitalize; }
.lista { height: 240px; overflow-y: auto; text-align: left; padding: 5px; font-size: 14px; }

#listaChamadaAlunos { height: 160px; }

#calendario { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; max-width: 700px; margin: 20px auto; }
.dia-cell { border: 1px solid #ccc; min-height: 70px; padding: 5px; text-align: left; background: #fdfdfd; position: relative; }
.dia-cell h4 { margin: 0; font-size: 14px; color: #555; }
.marcador-aluno { background: #007bff; color: white; font-size: 10px; padding: 2px 4px; border-radius: 4px; margin-top: 2px; font-weight: bold; cursor: pointer; }

.item-chamada { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 3px 0; }
.btn-pdf { background: #28a745; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 90%; margin-top: 10px; }

/* Botões de filtro gerados dinamicamente */
.btn-filtro { margin: 2px; padding: 5px 10px; cursor: pointer; text-transform: capitalize; }
</style>
</head>

<body>

<h1>Painel de Alunos</h1>

<div style="margin:20px;">
  <input type="text" id="buscaNome" placeholder="🔍 Buscar aluno..." 
         style="padding:8px; width:200px; border-radius:8px; border:1px solid #ccc;">
  <br><br>
  <div id="containerBotoesFiltro"></div>
</div>

<p>Atualizado: <span id="hora"></span></p>

<div class="layoutPrincipal">
  <div class="filtroLateral">
    <div class="area">
      <div class="titulo" id="tituloFiltro">
        Filtro: <span id="nomeFiltro">Todos</span> (<span id="qtdFiltro">0</span>)
      </div>
      <div class="lista" id="listaFiltro"></div>
    </div>

    <div class="area area-chamada">
      <div class="titulo">📋 Lista de Chamada</div>
      
      <select id="escolherCurso" onchange="gerarListaParaChamada()" style="width: 90%; margin: 5px;">
          <option value="">Escolha o curso...</option>
      </select>

      <div id="containerTurmasNicho" style="display:none; background:#f9f9f9; padding:5px; border-bottom:1px solid #ddd;">
          <div id="botoesNichos" style="display: flex; flex-wrap: wrap; gap: 5px; justify-content: center;"></div>
      </div>

      <div class="lista" id="listaChamadaAlunos"></div>
      
      <div id="areaSeguranca" style="display:none; padding: 10px; background: #eee; border-radius: 5px; margin: 5px;">
        <label style="font-size: 11px; font-weight: bold;">🔑 CÓD. ACESSO PROFESSOR:</label>
        <input type="password" id="codProfessor" placeholder="Digite seu código..." 
               style="width: 80%; padding: 5px; border-radius: 4px; border: 1px solid #ccc; text-align: center;">
      </div>
      
      <button id="btnSalvar" class="btn-pdf" onclick="salvarRelatorioNoSheets()">Confirmar e Salvar no Sheets 📊</button>
    </div>
  </div> 
  <div class="conteudoDireita">
    <div class="topo-container">
      <div id="calendario"></div>
      <div style="display:flex; flex-direction:column; gap:10px;">
        <div class="imagem-lateral">
          <img src="tabela.png" alt="Tabela de Segmentos">
        </div>
        
        <div id="areaMicrosSalas" style="background: #fff; border: 2px solid #ccc; border-radius: 10px; padding: 10px; margin-top: 10px; display: none;">
            <h3 style="margin: 0 0 10px 0; font-size: 14px; background: #28a745; color: white; padding: 5px; border-radius: 5px;">🏫 Alunos Presentes Agora</h3>
            <div id="microsSalasLaterais" style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;"></div>
        </div>
        
      </div>
    </div>
  </div>
</div>

<div id="patio">
  <h2>🚨 PÁTIO (Alunos com problema)</h2>
  <div id="alunosErro"></div>
</div>

<div id="containerSegmentosDinamicos"></div>

<div class="area"><div class="titulo">(Mês/dia)Curso</div><div class="lista" id="listaDia"></div></div>
<div class="area"><div class="titulo">Resumo Geral</div><div class="lista" id="resumo"></div></div>

<div id="modal" class="modal">
  <div class="modal-conteudo">
    <span class="fechar" onclick="fecharModal()">X</span>
    <h3 id="tituloDia"></h3>
    <div id="listaModal"></div>
  </div>
</div>

<script>
let chaveCorretaDaTurma = ""; 
const URL = "https://script.google.com/macros/s/AKfycbw6M3HJYqILtm8LinU_4gVz649UayIh1FGY_fMRHDByi8dj4itN9sxMJXnAX-YSj7v6/exec";
let alunosGlobal = [];
let filtroAtual = "todos";

function verificarProblemas(aluno) {
  let erros = [];
  
  // Verificações básicas obrigatórias
  if (!aluno.aluno || aluno.aluno.trim() === "") erros.push("❌ Nome");
  if (!aluno.serie || aluno.serie.trim() === "") erros.push("❌ Série");
  if (!aluno.curso || aluno.curso.trim() === "") erros.push("❌ Curso");
  if (!aluno.segmento || aluno.segmento.trim() === "") erros.push("❌ Segmento");
  if (!aluno.inicio || !aluno.fim) erros.push("⏰ Horário");

  // LÓGICA DE DATA/SEMANA AJUSTADA
  const temDataFixa = aluno.dia && String(aluno.dia).trim() !== "";
  const temDiaSemana = aluno.diasSemana && String(aluno.diasSemana).trim() !== "";

  if (!temDataFixa && !temDiaSemana) {
    erros.push("📅 Sem Data/Semana");
  }

  return erros;
}

async function atualizarPainel() {
  try {
    const resposta = await fetch(URL);
    const dadosBrutos = await resposta.json();
    
    // 🛑 FILTRO ANTI-FANTASMA: Remove lixo da planilha
    alunosGlobal = dadosBrutos.filter(a => {
        let nome = (a.aluno || "").trim().toLowerCase();
        
        // 1. Ignora linhas de cabeçalho ou erros clássicos
        if (nome === "" || nome === "#n/a" || nome === "#ref!" || nome === "aluno" || nome === "nome") return false;
        
        // 2. Se a linha não tem curso, não tem série e não tem hora, é 100% lixo/linha vazia
        let temCurso = a.curso && a.curso.trim() !== "";
        let temSerie = a.serie && a.serie.trim() !== "";
        let temHora = a.inicio && a.inicio.trim() !== "";
        
        if (!temCurso && !temSerie && !temHora) return false;
        
        return true; 
    });
    
    const patio = document.getElementById("alunosErro");
    patio.innerHTML = "";
    alunosGlobal.filter(a => verificarProblemas(a).length > 0).forEach(a => {
      const erros = verificarProblemas(a);
      const div = document.createElement("div");
      div.className = "alunoErro";
      div.innerHTML = `⚠️ [${a.serie || "S/S"}] ${a.aluno || "Sem Nome"} <small>${erros.join("<br>")}</small>`;
      patio.appendChild(div);
    });

    const select = document.getElementById("escolherCurso");
    const valorAntigo = select.value;
    const cursos = [...new Set(alunosGlobal.map(a => a.curso).filter(c => c))];
    select.innerHTML = '<option value="">Escolha o curso...</option>';
    cursos.sort().forEach(c => select.innerHTML += `<option value="${c}">${c}</option>`);
    select.value = valorAntigo;

    renderizarCaixasSegmentos();
    filtrar(filtroAtual);
    renderizarMicrosSalas(); // Atualiza as salas dinâmicas a cada recarregamento

    const agora = new Date();
    document.getElementById("hora").innerText = agora.getHours() + ":" + String(agora.getMinutes()).padStart(2,'0');
  } catch (e) { console.error("Erro ao atualizar o painel: ", e); }
}

function renderizarCaixasSegmentos() {
    let grupos = {}; 
    let diaC = [];   
    let totalErros = 0;

    alunosGlobal.forEach(item => {
        if (verificarProblemas(item).length > 0) totalErros++;

        let seg = (item.segmento || "Extra").trim();
        let alunoNome = item.aluno || "Sem Nome";
        let serie = item.serie || "S/S"; 
        let curso = item.curso || "S/C";
        let prof = item.prof || "Sem Prof.";
        let inicio = item.inicio ? item.inicio.substring(0,5) : "--:--";
        let fim = item.fim ? item.fim.substring(0,5) : "--:--";

        let txtComum = `
            <div style="margin-bottom: 8px; border-bottom: 1px dashed #ccc; padding-bottom: 4px;">
                👤 <b>[${serie}] ${alunoNome}</b> (${inicio}-${fim})<br>
                📘 ${curso} | 👨‍🏫 <b>${prof}</b>
            </div>`;

        if (!grupos[seg]) { grupos[seg] = []; }
        grupos[seg].push(txtComum);

        let dataExibicao = item.dia ? item.dia : (item.diasSemana || "---");
        let txtDia = `
            <div style="margin-bottom: 8px; border-bottom: 1px dashed #ccc; padding-bottom: 4px;">
                👤 <b>[${serie}] ${alunoNome}</b> | 📅 <b>${dataExibicao}</b><br>
                📘 ${curso} | 👨‍🏫 ${prof}
            </div>`;
        diaC.push(txtDia);
    });
    
    const containerSegmentos = document.getElementById("containerSegmentosDinamicos");
    const containerBotoes = document.getElementById("containerBotoesFiltro");
    
    containerSegmentos.innerHTML = ""; 
    containerBotoes.innerHTML = `<button class="btn-filtro" onclick="filtrar('todos')">Todos</button>`;
    
    let textoResumo = `Total: ${alunosGlobal.length} alunos<br>`;

    Object.keys(grupos).sort().forEach(nomeSegmento => {
        let alunosDoSegmento = grupos[nomeSegmento];
        
        containerSegmentos.innerHTML += `
        <div class="area">
            <div class="titulo">${nomeSegmento}</div>
            <div class="lista">${alunosDoSegmento.join("")}</div>
        </div>`;
        
        containerBotoes.innerHTML += `<button class="btn-filtro" onclick="filtrar('${nomeSegmento.toLowerCase()}')">${nomeSegmento}</button>`;
        textoResumo += `${nomeSegmento}: ${alunosDoSegmento.length} | `;
    });

    document.getElementById("listaDia").innerHTML = diaC.join("");
    
    document.getElementById("resumo").innerHTML = `
        <div style="text-align:left; font-size:14px; line-height: 1.5;">
            ${textoResumo}<br>
            <strong style="color:red; font-size: 16px;">🚨 Pátio: ${totalErros}</strong>
        </div>`;
}

function filtrar(tipo) {
  filtroAtual = tipo;
  const busca = document.getElementById("buscaNome").value.toLowerCase();
  const listaFiltro = document.getElementById("listaFiltro");
  listaFiltro.innerHTML = "";

  const filtrados = alunosGlobal.filter(a => {
    const segAluno = (a.segmento || "").toLowerCase();
    const bateTipo = (tipo === "todos") || (segAluno === tipo);
    const bateBusca = (a.aluno || "").toLowerCase().includes(busca);
    return bateTipo && bateBusca;
  });

  filtrados.forEach(a => listaFiltro.innerHTML += `👤 [${a.serie || 'S/S'}] ${a.aluno} (${a.curso || ''})<br>`);
  document.getElementById("nomeFiltro").innerText = tipo.toUpperCase();
  document.getElementById("qtdFiltro").innerText = filtrados.length;

  const hoje = new Date();
  gerarCalendario(hoje.getMonth(), hoje.getFullYear(), filtrados);
}

function gerarCalendario(mes, ano, dados) {
  const calendario = document.getElementById("calendario");
  calendario.innerHTML = "";
  const diasSemanaNomes = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
  
  diasSemanaNomes.forEach(d => {
    const div = document.createElement("div"); 
    div.className="dia-cell"; div.style.fontWeight="bold"; div.style.minHeight="20px"; div.innerText=d;
    calendario.appendChild(div);
  });

  const primeiroDia = new Date(ano, mes, 1).getDay();
  const ultimoDia = new Date(ano, mes + 1, 0).getDate();

  for (let i = 0; i < primeiroDia; i++) {
    const v = document.createElement("div"); v.className="dia-cell"; v.style.background="#f0f0f0";
    calendario.appendChild(v);
  }

  for (let dia = 1; dia <= ultimoDia; dia++) {
    const divDia = document.createElement("div"); 
    divDia.className = "dia-cell";
    divDia.innerHTML = `<h4>${dia}</h4>`;
    
    const alunosDoDia = dados.filter(a => {
      let condicaoDiaFixo = false;
      let condicaoRecorrencia = false;

      if (a.dia && String(a.dia).trim() !== "") {
          let partes = a.dia.split("-");
          let d, m, y;
          if (partes[0].length === 4) { [y, m, d] = partes; } 
          else { [d, m, y] = partes; }

          if (parseInt(d) === dia && (parseInt(m) - 1) === mes && parseInt(y) === ano) {
              condicaoDiaFixo = true;
          }
      }
      
      if (a.diasSemana && String(a.diasSemana).trim() !== "") {
          const dataCelular = new Date(ano, mes, dia);
          const dSem = dataCelular.getDay(); 
          const map = {"DOM": 0, "SEG": 1, "TER": 2, "QUA": 3, "QUI": 4, "SEX": 5, "SAB": 6};
          
          if (a.diasSemana.split("-").some(ds => map[ds.trim().toUpperCase()] === dSem)) {
              condicaoRecorrencia = true;
          }
      }
      return condicaoDiaFixo || condicaoRecorrencia;
    });

    if (alunosDoDia.length > 0) {
      const tag = document.createElement("div");
      tag.className = "marcador-aluno";
      tag.innerText = `🎯 ${alunosDoDia.length} Alunos`;
      tag.onclick = () => abrirModal(dia, mes, ano, alunosDoDia);
      divDia.appendChild(tag);
    }
    calendario.appendChild(divDia);
  }
}

function abrirModal(dia, mes, ano, alunos) {
  document.getElementById("tituloDia").innerText = `Dia ${dia}/${mes+1}/${ano}`;
  const lista = document.getElementById("listaModal");
  lista.innerHTML = "";
  alunos.forEach(a => {
    const div = document.createElement("div"); 
    div.className="aluno " + (a.segmento||"").toLowerCase().replace("/","");
    div.style.marginBottom = "5px";
    div.style.padding = "5px";
    div.innerHTML = `<b>[${a.serie || 'S/S'}] ${a.aluno}</b><br><small>${a.curso} (${a.inicio}-${a.fim})<br>Prof: ${a.prof || '---'}</small>`;
    lista.appendChild(div);
  });
  document.getElementById("modal").style.display = "flex";
}

function fecharModal() { document.getElementById("modal").style.display = "none"; }

function gerarListaParaChamada() {
    const curso = document.getElementById("escolherCurso").value;
    const containerNichos = document.getElementById("containerTurmasNicho");
    const divBotoes = document.getElementById("botoesNichos");
    const listaAlunosUI = document.getElementById("listaChamadaAlunos");
    const areaSeg = document.getElementById("areaSeguranca");

    listaAlunosUI.innerHTML = ""; 
    divBotoes.innerHTML = "";     
    areaSeg.style.display = "none"; 

    if (!curso) {
        containerNichos.style.display = "none";
        return;
    }

    const alunosDoCurso = alunosGlobal.filter(a => a.curso === curso);
    const turmasUnicas = [];
    const controle = new Set();

    alunosDoCurso.forEach(a => {
        const chaveFiltro = `${a.diasSemana}-${a.inicio}-${a.serie}`;
        if (!controle.has(chaveFiltro) && a.diasSemana && a.inicio) {
            controle.add(chaveFiltro);
            turmasUnicas.push({ dia: a.diasSemana, hora: a.inicio, serie: a.serie, senha: a.chaves });
        }
    });

    if (turmasUnicas.length > 0) {
        containerNichos.style.display = "block";
        turmasUnicas.forEach(t => {
            const btn = document.createElement("button");
            btn.className = "btn-nicho-turma";
            btn.innerText = `${t.serie} (${t.dia} - ${t.hora})`;
            btn.onclick = () => {
                document.querySelectorAll('.btn-nicho-turma').forEach(b => b.classList.remove('ativo'));
                btn.classList.add('ativo');
                chaveCorretaDaTurma = t.senha; 
                mostrarAlunosDaTurmaEspecifica(curso, t.dia, t.hora, t.serie);
            };
            divBotoes.appendChild(btn);
        });
    } else {
        containerNichos.style.display = "none";
        listaAlunosUI.innerHTML = "<p style='font-size:12px; padding:10px;'>Nenhuma turma encontrada.</p>";
    }
}

function mostrarAlunosDaTurmaEspecifica(curso, dia, hora, serie) {
    const container = document.getElementById("listaChamadaAlunos");
    const areaSeg = document.getElementById("areaSeguranca");
    container.innerHTML = "";
    areaSeg.style.display = "block"; 

    const filtrados = alunosGlobal.filter(a => 
        a.curso === curso && a.diasSemana === dia && a.inicio === hora && a.serie === serie
    );

    filtrados.sort((a,b) => a.aluno.localeCompare(b.aluno)).forEach(a => {
        // 🔥 LÓGICA DA CHAMADA PRÉ-PREENCHIDA: Lê o 'p' ou 'vazio' da API
        const isPresente = (a.presente && a.presente.trim().toLowerCase() === "p");
        const selecaoV = isPresente ? "selected" : "";
        const selecaoX = !isPresente ? "selected" : "";

        // Adicionado onchange="atualizarPresencaLocal(this)"
        container.innerHTML += `
            <div class="item-chamada">
                <span><b>[${a.serie || 'S/S'}]</b> ${a.aluno}</span>
                <select class="sel-presenca" data-aluno="${a.aluno}" onchange="atualizarPresencaLocal(this)">
                    <option value="(V)" ${selecaoV}>✅ (V)</option>
                    <option value="(X)" ${selecaoX}>❌ (X)</option>
                </select>
            </div>`;
    });
}

// 🔥 FUNÇÃO: Redesenha as salinhas baseado em quem está com "p"
function renderizarMicrosSalas() {
    const containerMaster = document.getElementById("areaMicrosSalas");
    const containerSalas = document.getElementById("microsSalasLaterais");
    if (!containerSalas) return;
    
    containerSalas.innerHTML = "";

    const presentes = alunosGlobal.filter(a => a.presente && a.presente.trim().toLowerCase() === 'p');

    if (presentes.length === 0) {
        containerMaster.style.display = "none";
        return;
    }

    containerMaster.style.display = "block";

    let salas = {};
    presentes.forEach(a => {
        let nomeSala = a.serie || a.curso || "Geral";
        if (!salas[nomeSala]) salas[nomeSala] = [];
        salas[nomeSala].push(a.aluno);
    });

    Object.keys(salas).sort().forEach(sala => {
        let alunosHtml = salas[sala].map(nome => `<div style="font-size:11px; padding:3px 0; border-bottom: 1px dashed #ddd;">✅ ${nome}</div>`).join('');
        
        containerSalas.innerHTML += `
            <div class="area" style="width: 140px; height: auto; min-height: 80px; margin: 5px; border-color: #28a745;">
                <div class="titulo" style="background: #d4edda; color: #155724; font-size: 12px; font-weight: bold;">🚪 ${sala}</div>
                <div class="lista" style="height: auto; max-height: 150px; overflow-y: auto;">
                    ${alunosHtml}
                </div>
            </div>
        `;
    });
}

// 🔥 FUNÇÃO: Atualiza a sala instantaneamente quando o professor muda o Select
function atualizarPresencaLocal(selectElement) {
    const nomeAluno = selectElement.dataset.aluno;
    const novoValor = selectElement.value;
    
    let alunoObj = alunosGlobal.find(a => a.aluno === nomeAluno);
    if (alunoObj) {
        alunoObj.presente = (novoValor === "(V)") ? "p" : "";
        renderizarMicrosSalas(); 
    }
}

async function salvarRelatorioNoSheets() {
    const curso = document.getElementById("escolherCurso").value;
    const senhaDigitada = document.getElementById("codProfessor").value;
    const btn = document.getElementById("btnSalvar");

    if(!curso) return alert("Escolha o curso!");
    if(!chaveCorretaDaTurma) return alert("Selecione uma turma antes!");
    
    if(senhaDigitada !== chaveCorretaDaTurma) {
        alert("❌ CÓDIGO DE ACESSO INCORRETO!\nA chamada não pôde ser enviada.");
        return;
    }

    btn.disabled = true; 
    btn.innerText = "⏳ Enviando...";

    let dados = [];
    document.querySelectorAll(".sel-presenca").forEach(sel => {
        const nomeAluno = sel.dataset.aluno;
        const info = alunosGlobal.find(a => a.aluno === nomeAluno);
        dados.push({ 
            nome: nomeAluno, 
            presenca: sel.value, 
            curso: curso,
            data: new Date().toLocaleDateString('pt-BR'),
            segmento: info ? info.segmento : "S/S", 
            prof: info ? info.prof : "Sem Prof."
        });
    });

    try {
        const resposta = await fetch(URL, { method: 'POST', body: JSON.stringify({ alunos: dados }) });
        const resultado = await resposta.text();
        alert(resultado);
        document.getElementById("codProfessor").value = ""; 
    } catch (e) { alert("Erro ao salvar: " + e.message); }
    
    btn.disabled = false; 
    btn.innerText = "Confirmar e Salvar no Sheets 📊";
}

document.getElementById("buscaNome").addEventListener("input", () => filtrar(filtroAtual));
atualizarPainel();
setInterval(atualizarPainel, 30000);
</script>
