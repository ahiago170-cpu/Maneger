<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel de Alunos com Calendário</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
.topo-container {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  gap: 30px;
}

.imagem-lateral img {
  width: 250px;
  border: 2px solid #333;
  border-radius: 10px;
}
.layoutPrincipal {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  gap: 30px;
  margin-top: 20px;
}

.filtroLateral {
  width: 260px;
}

.conteudoDireita {
  flex: 1;
  max-width: 700px;
}

#patio {
  margin: 20px auto;
  padding: 15px;
  max-width: 700px;
  background: #ffe5e5;
  border: 3px dashed red;
  border-radius: 10px;
}

#alunosErro {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
}

.alunoErro {
  background: red;
  color: white;
  padding: 10px;
  border-radius: 8px;
  font-weight: bold;
  animation: pular 0.8s infinite alternate;
}

@keyframes pular {
  from { transform: translateY(0px); }
  to { transform: translateY(-10px); }
}

.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

.modal-conteudo {
  background: white;
  padding: 20px;
  border-radius: 10px;
  width: 300px;
  max-height: 400px;
  overflow-y: auto;
}

.fechar {
  cursor: pointer;
  float: right;
  font-weight: bold;
}

body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
  color: #111;
}

.aluno.integral { background: #b9fbc0; }
.aluno.extra { background: #a0c4ff; }
.aluno.quadra { background: #fff3b0; }
.aluno.lc { background: #e0aaff; }

.area {
  display: inline-block;
  width: 260px;
  height: 350px; /* Aumentei um pouco para caber o botão */
  margin: 10px;
  border: 3px solid #333;
  border-radius: 10px;
  background: white;
  position: relative;
  vertical-align: top;
  overflow: hidden;
}

.titulo {
  font-weight: bold;
  padding: 5px;
  background: #eee;
}

.lista {
  height: 240px;
  overflow-y: auto;
  text-align: left;
  padding: 10px;
  font-size: 13px;
}

#calendario {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
  max-width: 700px;
  margin: 20px auto;
}

.dia {
  border: 1px solid #ccc;
  min-height: 60px;
  padding: 5px;
  text-align: left;
  background: #fdfdfd;
  position: relative;
}

.dia h4 { margin: 0; font-size: 14px; }

.aluno {
  color: #000;
  font-weight: bold;
  border-left: 4px solid #333;
  margin-bottom: 2px;
  padding-left: 5px;
}

/* Estilo específico para os selects da chamada */
.item-chamada {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0;
    border-bottom: 1px solid #eee;
}
.sel-presenca {
    padding: 2px;
    border-radius: 4px;
    font-size: 11px;
}
.btn-confirmar {
    background: #28a745;
    color: white;
    border: none;
    padding: 8px;
    width: 90%;
    margin: 5px auto;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
}
</style>
</head>

<body>

<h1>Painel de Alunos</h1>

<div style="margin:20px;">
  <input type="text" id="buscaNome" placeholder="🔍 Buscar aluno..." 
         style="padding:8px; width:200px; border-radius:8px; border:1px solid #ccc;">
  <br><br>
  <button onclick="filtrar('todos')">Todos</button>
  <button onclick="filtrar('integral')">Integral</button>
  <button onclick="filtrar('extra')">Extra</button>
  <button onclick="filtrar('quadra')">Quadra</button>
  <button onclick="filtrar('l/c')">L/C</button>
</div>

<p>Atualizado: <span id="hora"></span></p>

<div class="layoutPrincipal">

  <div class="filtroLateral">
    <div class="area" style="height: 300px;">
      <div class="titulo" id="tituloFiltro">
        Filtro: <span id="nomeFiltro">Todos</span> (<span id="qtdFiltro">0</span>)
      </div>
      <div class="lista" id="listaFiltro"></div>
    </div>

    <div class="area">
      <div class="titulo">📋 Lista de Chamada</div>
      <div style="padding: 5px;">
          <select id="escolherCursoChamada" onchange="renderizarChamadaPorCurso()" style="width: 100%; padding: 5px;">
              <option value="">Selecione o Curso...</option>
          </select>
      </div>
      <div class="lista" id="listaChamadaAlunos">
          <small style="color:gray">Selecione um curso acima para carregar os alunos.</small>
      </div>
      <button class="btn-confirmar" onclick="gerarPDFChamada()">Gerar PDF para Imprimir 🖨️</button>
    </div>
  </div>

  <div class="conteudoDireita">
    <div class="topo-container">
      <div id="calendario"></div>
      <div class="imagem-lateral">
        <img src="tabela.png" alt="Tabela de Segmentos">
      </div>
    </div>
  </div>

</div>

<div id="patio">
  <h2>🚨 PÁTIO (Alunos com problema)</h2>
  <div id="alunosErro"></div>
</div>

<div id="modal" class="modal">
  <div class="modal-conteudo">
    <span class="fechar" onclick="fecharModal()">X</span>
    <h3 id="tituloDia"></h3>
    <div id="listaModal"></div>
  </div>
</div> 

<div class="area"><div class="titulo">Integral</div><div class="lista" id="listaIntegral"></div></div>
<div class="area"><div class="titulo">Extra</div><div class="lista" id="listaExtra"></div></div>
<div class="area"><div class="titulo">Quadra</div><div class="lista" id="listaQuadra"></div></div>
<div class="area"><div class="titulo">Lição de Casa</div><div class="lista" id="listaLC"></div></div>
<div class="area"><div class="titulo">(Mês/dia)Curso</div><div class="lista" id="listaDia"></div></div>
<div class="area"><div class="titulo">Resumo Geral</div><div class="lista" id="resumo"></div></div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbzQseSpaq3ePxcVV5dZG19HAV4AXEP9Ah0bNZV2rjNqxoOEf42kTdmyUqrbjHpRjYxn/exec";
let alunosGlobal = [];
let filtroAtual = "todos";

function limpar(valor){
  return valor ? String(valor).trim() : "";
}

function limparHora(h){
  if(!h) return "";
  return String(h).substring(0,5);
}

// --- FUNÇÕES DA LISTA DE CHAMADA ---

function atualizarSelectCursos() {
    const select = document.getElementById("escolherCursoChamada");
    const valorAtual = select.value;
    
    // Pega cursos únicos
    const cursos = [...new Set(alunosGlobal.map(a => limpar(a.curso)).filter(c => c !== ""))];
    
    select.innerHTML = '<option value="">Selecione o Curso...</option>';
    cursos.sort().forEach(c => {
        const opt = document.createElement("option");
        opt.value = c;
        opt.innerText = c;
        select.appendChild(opt);
    });
    select.value = valorAtual;
}

function renderizarChamadaPorCurso() {
    const cursoSelecionado = document.getElementById("escolherCursoChamada").value;
    const container = document.getElementById("listaChamadaAlunos");
    container.innerHTML = "";

    if(!cursoSelecionado) {
        container.innerHTML = '<small style="color:gray">Selecione um curso acima.</small>';
        return;
    }

    const filtrados = alunosGlobal.filter(a => limpar(a.curso) === cursoSelecionado);

    if(filtrados.length === 0) {
        container.innerHTML = "Nenhum aluno neste curso.";
        return;
    }

    filtrados.sort((a,b) => (a.aluno > b.aluno ? 1 : -1)).forEach(a => {
        const div = document.createElement("div");
        div.className = "item-chamada";
        div.innerHTML = `
            <span>${a.aluno}</span>
            <select class="sel-presenca" data-nome="${a.aluno}">
                <option value="(V)">✅ (V)</option>
                <option value="(X)">❌ (X)</option>
            </select>
        `;
        container.appendChild(div);
    });
}

function gerarPDFChamada() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const curso = document.getElementById("escolherCursoChamada").value;
    
    if(!curso) { alert("Selecione um curso primeiro!"); return; }

    const dataHoje = new Date().toLocaleDateString('pt-BR');
    
    // Cabeçalho do PDF
    doc.setFontSize(18);
    doc.text("Lista de Chamada", 105, 20, { align: "center" });
    doc.setFontSize(12);
    doc.text(`Curso: ${curso}`, 20, 35);
    doc.text(`Data: ${dataHoje}`, 150, 35);
    doc.line(20, 40, 190, 40);

    // Tabela
    let y = 50;
    doc.setFont(undefined, 'bold');
    doc.text("Aluno", 25, y);
    doc.text("Presença", 150, y);
    doc.setFont(undefined, 'normal');
    doc.line(20, y+2, 190, y+2);
    y += 10;

    const selects = document.querySelectorAll(".sel-presenca");
    selects.forEach(sel => {
        doc.text(sel.getAttribute("data-nome"), 25, y);
        doc.text(sel.value, 160, y);
        doc.line(20, y+2, 190, y+2);
        y += 10;
        
        // Nova página se necessário
        if(y > 270) { doc.addPage(); y = 20; }
    });

    doc.save(`Chamada_${curso}_${dataHoje}.pdf`);
}

// --- FIM DAS FUNÇÕES DE CHAMADA ---

async function atualizarPainel() {
  try {
    const resposta = await fetch(URL);
    const alunos = await resposta.json();
    alunosGlobal = alunos;
    
    atualizarSelectCursos(); // Atualiza o select de chamada

    let integral = [], extra = [], quadra = [], lc = [], diaCurso = [];
    let tInt = 0, tExt = 0, tQua = 0, tLC = 0;

    alunos.forEach(item => {
      const segmento = (item.segmento || "").toLowerCase();
      const nome = item.aluno || "Sem nome";
      const curso = item.curso || "";
      const inicio = limparHora(item.inicio);
      const fim = limparHora(item.fim);

      let texto = "👤 " + nome;
      if(curso) texto += " - " + curso;
      if(inicio && fim) texto += " (" + inicio + " - " + fim + ")";

      if(segmento === "integral") { integral.push(texto); tInt++; }
      else if(segmento === "extra") { extra.push(texto); tExt++; }
      else if(segmento === "quadra") { quadra.push(texto); tQua++; }
      else if(segmento === "l/c") { lc.push(texto); tLC++; }

      if (!item.dia && !item.diasSemana) {
        diaCurso.push("⚠️ " + nome + " (SEM DATA)");
      } else {
        diaCurso.push("👤 " + nome + (curso ? " - " + curso : "") + " (" + (item.dia || item.diasSemana) + ")");
      }
    });

    document.getElementById("listaIntegral").innerHTML = integral.join("<br>");
    document.getElementById("listaExtra").innerHTML = extra.join("<br>");
    document.getElementById("listaQuadra").innerHTML = quadra.join("<br>");
    document.getElementById("listaLC").innerHTML = lc.join("<br>");
    document.getElementById("listaDia").innerHTML = diaCurso.join("<br>");
    
    document.getElementById("resumo").innerHTML = `
      👥 Total: <b>${alunos.length}</b><br><br>
      🟢 Integral: ${tInt}<br>🔵 Extra: ${tExt}<br>
      🟡 Quadra: ${tQua}<br>🟣 L/C: ${tLC}<br><br>
      📊 Status: Online ✔
    `;

    // PÁTIO
    let alunosComErro = alunos.filter(a => verificarProblemas(a).length > 0);
    const patio = document.getElementById("alunosErro");
    patio.innerHTML = "";
    alunosComErro.forEach(a => {
      const div = document.createElement("div");
      div.className = "alunoErro";
      div.innerHTML = `⚠️ <b>${a.aluno}</b><br><small>${verificarProblemas(a).join("<br>")}</small>`;
      patio.appendChild(div);
    });

    const agora = new Date();
    document.getElementById("hora").innerText = agora.getHours() + ":" + String(agora.getMinutes()).padStart(2,'0');

    const hoje = new Date();
    gerarCalendario(hoje.getMonth(), hoje.getFullYear(), filtrarAlunosParaCalendario());
    filtrar(filtroAtual);

  } catch (erro) { console.error("Erro API:", erro); }
}

function verificarProblemas(aluno) {
  let erros = [];
  if (!(aluno.curso || "").trim()) erros.push("❌ Curso");
  if (!(aluno.segmento || "").trim()) erros.push("❌ Segmento");
  if (!(aluno.dia || "").trim() && !(aluno.diasSemana || "").trim()) erros.push("📅 Sem data");
  return erros;
}

function filtrar(tipo) {
  filtroAtual = tipo;
  const nomes = {"todos": "Todos", "integral": "Integral", "extra": "Extra", "quadra": "Quadra", "l/c": "L/C"};
  const busca = document.getElementById("buscaNome").value.toLowerCase().trim();
  const lista = document.getElementById("listaFiltro");
  lista.innerHTML = "";

  let filtrados = alunosGlobal.filter(a => {
    const bateBusca = (a.aluno || "").toLowerCase().includes(busca);
    const bateTipo = (tipo === "todos") || ((a.segmento || "").toLowerCase() === tipo);
    return bateBusca && bateTipo;
  });

  filtrados.forEach(a => {
    let t = "👤 " + a.aluno + (a.curso ? " - " + a.curso : "");
    lista.innerHTML += t + "<br>";
  });

  document.getElementById("nomeFiltro").innerText = nomes[tipo] || tipo;
  document.getElementById("qtdFiltro").innerText = filtrados.length;
}

function gerarCalendario(mes, ano, dados) {
  const calendario = document.getElementById("calendario");
  calendario.innerHTML = "";
  const diasSemana = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
  diasSemana.forEach(d => {
    const div = document.createElement("div"); div.className="dia"; div.style.fontWeight="bold"; div.innerText=d;
    calendario.appendChild(div);
  });

  const primeiroDia = new Date(ano, mes, 1).getDay();
  const ultimoDia = new Date(ano, mes + 1, 0).getDate();

  for (let i = 0; i < primeiroDia; i++) {
    const v = document.createElement("div"); v.className="dia"; v.style.background="#eee";
    calendario.appendChild(v);
  }

  for (let dia = 1; dia <= ultimoDia; dia++) {
    const divDia = document.createElement("div"); divDia.className="dia";
    const h4 = document.createElement("h4"); h4.innerText = dia;
    divDia.appendChild(h4);

    const alunosDoDia = dados.filter(a => {
      if (a.dia) {
        const p = a.dia.split("-");
        if (p.length === 3 && Number(p[2]) === dia) return true;
      }
      if (a.diasSemana) {
        const map = {"DOM":0,"SEG":1,"TER":2,"QUA":3,"QUI":4,"SEX":5,"SAB":6};
        const dSem = new Date(ano, mes, dia).getDay();
        return a.diasSemana.split("-").some(d => map[d] === dSem);
      }
      return false;
    });

    if (alunosDoDia.length > 0) {
      const m = document.createElement("div"); m.innerText = "🎯 " + alunosDoDia.length;
      m.style.fontSize="10px"; m.style.fontWeight="bold";
      divDia.appendChild(m);
      divDia.onclick = () => abrirModal(dia, mes, ano, alunosDoDia);
    }
    calendario.appendChild(divDia);
  }
}

function abrirModal(dia, mes, ano, alunos) {
  const modal = document.getElementById("modal");
  const lista = document.getElementById("listaModal");
  document.getElementById("tituloDia").innerText = `Dia ${dia}/${mes+1}/${ano}`;
  lista.innerHTML = "";
  alunos.forEach(a => {
    const div = document.createElement("div");
    div.className = "aluno " + (a.segmento || "").toLowerCase().replace("/","");
    div.innerText = a.aluno + (a.curso ? " ("+a.curso+")" : "");
    lista.appendChild(div);
  });
  modal.style.display = "flex";
}

function fecharModal() { document.getElementById("modal").style.display = "none"; }

function filtrarAlunosParaCalendario() {
  const busca = document.getElementById("buscaNome").value.toLowerCase().trim();
  return alunosGlobal.filter(a => (a.aluno || "").toLowerCase().includes(busca));
}

atualizarPainel();
setInterval(atualizarPainel, 10000); // Aumentei para 10s para não travar a lista enquanto você marca
document.getElementById("buscaNome").addEventListener("input", () => filtrar(filtroAtual));
</script>

</body>
</html>
