<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel de Alunos</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
    }

    h1 {
      margin: 10px;
    }

    .area {
      display: inline-block;
      width: 200px;
      height: 150px;
      margin: 10px;
      border: 2px solid #fff;
      position: relative;
      border-radius: 10px;
    }

    .titulo {
      position: absolute;
      top: -20px;
      left: 10px;
      background: #111;
      padding: 2px 5px;
      font-size: 14px;
    }

    .aluno {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      position: absolute;
    }

    .integral {
      background: #00ff88;
    }

    .extra {
      background: #ffaa00;
    }
  </style>
</head>
<body>

<h1>Painel de Alunos</h1>
<p>Atualizado: <span id="hora"></span></p>

<div class="area" id="integral">
  <div class="titulo">Integral</div>
</div>

<div class="area" id="extra">
  <div class="titulo">Extra</div>
</div>

<div class="area" id="quadra">
  <div class="titulo">Quadra</div>
</div>

<script>
const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTSOJF-CPD4jDd1RYMk0hbHdVfyjDzgnYCph8VqFxI6AqYRuw-AxUF6gIIdzPJlAMh4HjWtF0sZ6eNp/pub?output=csv";

// cria bolinhas
function gerarAlunos(containerId, quantidade, tipo) {
  const container = document.getElementById(containerId);
  container.querySelectorAll('.aluno').forEach(e => e.remove());

  for (let i = 0; i < quantidade; i++) {
    const aluno = document.createElement('div');
    aluno.classList.add('aluno', tipo);

    aluno.style.left = Math.random() * 180 + "px";
    aluno.style.top = Math.random() * 130 + "px";

    container.appendChild(aluno);
  }
}

<script>
async function atualizar() {
  try {
    const resposta = await fetch(URL);
    const texto = await resposta.text();

    console.log("CSV bruto:", texto); // DEBUG

    const linhas = texto.trim().split(/\r?\n/).slice(1);

    let integral = 0;
    let extra = 0;
    let quadra = 0;

    linhas.forEach(linha => {
      // tenta detectar separador automaticamente
      let colunas;

      if (linha.includes(";")) {
        colunas = linha.split(";");
      } else {
        colunas = linha.split(",");
      }

      const turma = (colunas[1] || "").toLowerCase().trim();
      const curso = (colunas[2] || "").toLowerCase().trim();
      const sala  = (colunas[4] || "").toLowerCase().trim();

      console.log({ turma, curso, sala }); // DEBUG

      if (curso.includes("integral") || turma.includes("integral")) {
        integral++;
      }

      if (turma.includes("extra")) {
        extra++;
      }

      if (sala.includes("quadra")) {
        quadra++;
      }
    });

    console.log("Contagem:", { integral, extra, quadra });

    gerarAlunos("integral", integral, "integral");
    gerarAlunos("extra", extra, "extra");
    gerarAlunos("quadra", quadra, "extra");

    const agora = new Date();
    document.getElementById("hora").innerText =
      agora.getHours() + ":" + String(agora.getMinutes()).padStart(2, '0');

  } catch (erro) {
    console.error("Erro ao buscar dados:", erro);
  }
}
</script>

</body>
</html>
