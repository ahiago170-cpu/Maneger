<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel de Alunos com Calendário</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
/* ... (Mantive seus estilos originais para não mudar o visual) ... */
.topo-container { display: flex; justify-content: center; align-items: flex-start; gap: 30px; }
.imagem-lateral img { width: 250px; border: 2px solid #333; border-radius: 10px; }
.layoutPrincipal { display: flex; justify-content: center; align-items: flex-start; gap: 30px; margin-top: 20px; }
.filtroLateral { width: 260px; }
.conteudoDireita { flex: 1; max-width: 700px; }
#patio { margin: 20px auto; padding: 15px; max-width: 700px; background: #ffe5e5; border: 3px dashed red; border-radius: 10px; }
#alunosErro { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
.alunoErro { background: red; color: white; padding: 10px; border-radius: 8px; font-weight: bold; animation: pular 0.8s infinite alternate; }
@keyframes pular { from { transform: translateY(0px); } to { transform: translateY(-10px); } }
.modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1000; }
.modal-conteudo { background: white; padding: 20px; border-radius: 10px; width: 300px; max-height: 400px; overflow-y: auto; }
.fechar { cursor: pointer; float: right; font-weight: bold; }
body { font-family: Arial; text-align: center; background: #f5f5f5; color: #111; }
.aluno.integral { background: #b9fbc0; }
.aluno.extra { background: #a0c4ff; }
.aluno.quadra { background: #fff3b0; }
.aluno.lc { background: #e0aaff; }
.area { display: inline-block; width: 260px; height: 350px; margin: 10px; border: 3px solid #333; border-radius: 10px; background: white; position: relative; vertical-align: top; overflow: hidden; }
.titulo { font-weight: bold; padding: 5px; background: #eee; }
.lista { height: 240px; overflow-y: auto; text-align: left; padding: 10px; font-size: 13px; }
#calendario { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; max-width: 700px; margin: 20px auto; }
.dia { border: 1px solid #ccc; min-height: 60px; padding: 5px; text-align: left; background: #fdfdfd; position: relative; }
.dia h4 { margin: 0; font-size: 14px; }
.item-chamada { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 1px solid #eee; }
.btn-confirmar { background: #28a745; color: white; border: none; padding: 8px; width: 90%; margin: 5px auto; border-radius: 5px; cursor: pointer; font-weight: bold; }
</style>
</head>

<body>

<h1>Painel de Alunos</h1>

<div style="margin:20px;">
  <input type="text" id="buscaNome" placeholder="🔍 Buscar aluno..." 
         style="padding:8px; width:200px; border-radius:8px; border:1px solid #ccc;">
  <br><br>
  <button onclick="filtrar('todos')">Todos</button>
  <button onclick="filtrar('integral')">Integral</button>
  <button onclick="filtrar('extra')">Extra</button>
  <button onclick="filtrar('quadra')">Quadra</button>
  <button onclick="filtrar('l/c')">L/C</button>
</div>

<p>Atualizado: <span id="hora"></span></p>

<div class="layoutPrincipal">
  <div class="filtroLateral">
    <div class="area" style="height: 300px;">
      <div class="titulo" id="tituloFiltro">
        Filtro: <span id="nomeFiltro">Todos</span> (<span id="qtdFiltro">0</span>)
      </div>
      <div class="lista" id="listaFiltro"></div>
    </div>

    <div class="area">
      <div class="titulo">📋 Lista de Chamada</div>
      <div style="padding: 5px;">
          <select id="escolherCursoChamada" onchange="renderizarChamadaPorCurso()" style="width: 100%; padding: 5px;">
              <option value="">Selecione o Curso...</option>
          </select>
      </div>
      <div class="lista" id="listaChamadaAlunos"></div>
      <button class="btn-confirmar" onclick="gerarPDFChamada()">Gerar PDF 🖨️</button>
    </div>
  </div>

  <div class="conteudoDireita">
    <div id="calendario"></div>
  </div>
</div>

<div id="patio"><h2>🚨 PÁTIO</h2><div id="alunosErro"></div></div>
<div class="area"><div class="titulo">Integral</div><div class="lista" id="listaIntegral"></div></div>
<div class="area"><div class="titulo">Extra</div><div class="lista" id="listaExtra"></div></div>
<div class="area"><div class="titulo">Quadra</div><div class="lista" id="listaQuadra"></div></div>
<div class="area"><div class="titulo">Lição de Casa</div><div class="lista" id="listaLC"></div></div>

<div id="modal" class="modal">
  <div class="modal-conteudo">
    <span class="fechar" onclick="fecharModal()">X</span>
    <h3 id="tituloDia"></h3>
    <div id="listaModal"></div>
  </div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbzQseSpaq3ePxcVV5dZG19HAV4AXEP9Ah0bNZV2rjNqxoOEf42kTdmyUqrbjHpRjYxn/exec";
let alunosGlobal = [];
let filtroAtual = "todos";

// --- FUNÇÃO MESTRE DE FILTRO (Sincroniza Tudo) ---
function filtrar(tipo) {
  if (tipo) filtroAtual = tipo;
  
  const busca = document.getElementById("buscaNome").value.toLowerCase().trim();
  const nomesSegmentos = {"todos": "Todos", "integral": "Integral", "extra": "Extra", "quadra": "Quadra", "l/c": "L/C"};
  
  // 1. Filtra os alunos baseado no Segmento E na Busca por Nome
  const filtrados = alunosGlobal.filter(a => {
    const segmentoAluno = (a.segmento || "").toLowerCase().trim();
    const nomeAluno = (a.aluno || "").toLowerCase().trim();
    
    const bateTipo = (filtroAtual === "todos") || (segmentoAluno === filtroAtual);
    const bateBusca = nomeAluno.includes(busca);
    
    return bateTipo && bateBusca;
  });

  // 2. Atualiza a Lista Lateral de Filtro
  const listaFiltro = document.getElementById("listaFiltro");
  listaFiltro.innerHTML = filtrados.length ? "" : "Nenhum aluno encontrado";
  filtrados.forEach(a => {
    listaFiltro.innerHTML += `👤 ${a.aluno} ${a.curso ? '- '+a.curso : ''}<br>`;
  });

  document.getElementById("nomeFiltro").innerText = nomesSegmentos[filtroAtual] || filtroAtual;
  document.getElementById("qtdFiltro").innerText = filtrados.length;

  // 3. Atualiza o Calendário com os mesmos alunos filtrados
  const hoje = new Date();
  gerarCalendario(hoje.getMonth(), hoje.getFullYear(), filtrados);
}

// --- RESTANTE DAS FUNÇÕES ---

async function atualizarPainel() {
  try {
    const resposta = await fetch(URL);
    alunosGlobal = await resposta.json();
    
    // Atualiza os selects de cursos apenas na carga inicial ou se mudarem
    atualizarSelectCursos();
    
    // Atualiza os resumos estáticos (caixas lá embaixo)
    renderizarResumosFixos();
    
    // Roda o filtro para atualizar Lista Lateral e Calendário
    filtrar(); 
    
    const agora = new Date();
    document.getElementById("hora").innerText = agora.getHours() + ":" + String(agora.getMinutes()).padStart(2,'0');
  } catch (e) { console.error("Erro:", e); }
}

function renderizarResumosFixos() {
    let int = [], ext = [], qua = [], lc = [];
    alunosGlobal.forEach(a => {
        const seg = (a.segmento || "").toLowerCase();
        let txt = `👤 ${a.aluno} (${limparHora(a.inicio)}-${limparHora(a.fim)})`;
        if(seg === "integral") int.push(txt);
        else if(seg === "extra") ext.push(txt);
        else if(seg === "quadra") qua.push(txt);
        else if(seg === "l/c") lc.push(txt);
    });
    document.getElementById("listaIntegral").innerHTML = int.join("<br>");
    document.getElementById("listaExtra").innerHTML = ext.join("<br>");
    document.getElementById("listaQuadra").innerHTML = qua.join("<br>");
    document.getElementById("listaLC").innerHTML = lc.join("<br>");
}

function gerarCalendario(mes, ano, dados) {
  const calendario = document.getElementById("calendario");
  calendario.innerHTML = "";
  const diasSemana = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
  diasSemana.forEach(d => {
    const div = document.createElement("div"); div.className="dia"; div.style.fontWeight="bold"; div.innerText=d;
    calendario.appendChild(div);
  });

  const primeiroDia = new Date(ano, mes, 1).getDay();
  const ultimoDia = new Date(ano, mes + 1, 0).getDate();

  for (let i = 0; i < primeiroDia; i++) {
    const v = document.createElement("div"); v.className="dia"; v.style.background="#eee";
    calendario.appendChild(v);
  }

  for (let dia = 1; dia <= ultimoDia; dia++) {
    const divDia = document.createElement("div"); divDia.className="dia";
    const h4 = document.createElement("h4"); h4.innerText = dia;
    divDia.appendChild(h4);

    const alunosDoDia = dados.filter(a => {
      if (a.dia) {
        const p = a.dia.split("-");
        if (p.length === 3 && Number(p[2]) === dia) return true;
      }
      if (a.diasSemana) {
        const map = {"DOM":0,"SEG":1,"TER":2,"QUA":3,"QUI":4,"SEX":5,"SAB":6};
        const dSem = new Date(ano, mes, dia).getDay();
        return a.diasSemana.split("-").some(d => map[d] === dSem);
      }
      return false;
    });

    if (alunosDoDia.length > 0) {
      const m = document.createElement("div"); 
      m.innerText = "🎯 " + alunosDoDia.length;
      m.style.fontSize="10px"; m.style.fontWeight="bold"; m.style.marginTop="5px";
      divDia.appendChild(m);
      divDia.onclick = () => abrirModal(dia, mes, ano, alunosDoDia);
      divDia.style.cursor = "pointer";
      divDia.style.background = "#fffceb";
    }
    calendario.appendChild(divDia);
  }
}

function atualizarSelectCursos() {
    const select = document.getElementById("escolherCursoChamada");
    const valorSalvo = select.value;
    const cursos = [...new Set(alunosGlobal.map(a => (a.curso || "").trim()).filter(c => c !== ""))];
    select.innerHTML = '<option value="">Selecione o Curso...</option>';
    cursos.sort().forEach(c => {
        const opt = document.createElement("option"); opt.value = c; opt.innerText = c;
        select.appendChild(opt);
    });
    select.value = valorSalvo;
}

function renderizarChamadaPorCurso() {
    const curso = document.getElementById("escolherCursoChamada").value;
    const container = document.getElementById("listaChamadaAlunos");
    container.innerHTML = curso ? "" : "<small>Selecione um curso.</small>";
    if(!curso) return;
    alunosGlobal.filter(a => (a.curso || "").trim() === curso).forEach(a => {
        container.innerHTML += `<div class="item-chamada"><span>${a.aluno}</span><select class="sel-presenca" data-nome="${a.aluno}"><option value="(V)">✅ (V)</option><option value="(X)">❌ (X)</option></select></div>`;
    });
}

function gerarPDFChamada() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const curso = document.getElementById("escolherCursoChamada").value;
    if(!curso) return alert("Selecione o curso!");
    doc.text(`Chamada: ${curso}`, 20, 20);
    let y = 30;
    document.querySelectorAll(".sel-presenca").forEach(sel => {
        doc.text(`${sel.getAttribute("data-nome")}: ${sel.value}`, 20, y);
        y += 10;
    });
    doc.save(`Chamada_${curso}.pdf`);
}

function abrirModal(dia, mes, ano, alunos) {
  const modal = document.getElementById("modal");
  const lista = document.getElementById("listaModal");
  document.getElementById("tituloDia").innerText = `Dia ${dia}/${mes+1}/${ano}`;
  lista.innerHTML = "";
  alunos.forEach(a => {
    const div = document.createElement("div");
    div.className = "aluno " + (a.segmento || "").toLowerCase().replace("/","");
    div.innerText = a.aluno + (a.curso ? " ("+a.curso+")" : "");
    lista.appendChild(div);
  });
  modal.style.display = "flex";
}
function fecharModal() { document.getElementById("modal").style.display = "none"; }
function limparHora(h){ return h ? String(h).substring(0,5) : ""; }

// Inicia o sistema
atualizarPainel();
setInterval(atualizarPainel, 30000); // Atualiza a cada 30 segundos para não atrapalhar a digitação
document.getElementById("buscaNome").addEventListener("input", () => filtrar());
</script>

</body>
</html>
