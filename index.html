<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel de Alunos com Calendário</title>

<style>
/* ===== SEU CSS ORIGINAL (NÃO ALTEREI) ===== */
#patio {
  margin: 20px auto;
  padding: 15px;
  max-width: 700px;
  background: #ffe5e5;
  border: 3px dashed red;
  border-radius: 10px;
}

#alunosErro {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
}

.alunoErro {
  background: red;
  color: white;
  padding: 10px;
  border-radius: 8px;
  font-weight: bold;
  animation: pular 0.8s infinite alternate;
}

@keyframes pular {
  from { transform: translateY(0px); }
  to { transform: translateY(-10px); }
}

.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-conteudo {
  background: white;
  padding: 20px;
  border-radius: 10px;
  width: 300px;
  max-height: 400px;
  overflow-y: auto;
}

.fechar {
  cursor: pointer;
  float: right;
  font-weight: bold;
}

body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
}

.area {
  display: inline-block;
  width: 260px;
  height: 300px;
  margin: 10px;
  border: 3px solid #333;
  border-radius: 10px;
  background: white;
}

.titulo {
  font-weight: bold;
  padding: 5px;
  background: #eee;
}

.lista {
  height: 240px;
  overflow-y: auto;
  text-align: left;
  padding: 5px;
}

#calendario {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
  max-width: 700px;
  margin: 20px auto;
}

.dia {
  border: 1px solid #ccc;
  min-height: 70px;
  padding: 5px;
  background: white;
}
</style>
</head>

<body>

<h1>Painel de Alunos</h1>
<p>Atualizado: <span id="hora"></span></p>

<!-- CONTROLE DE MÊS -->
<div>
  <button onclick="mudarMes(-1)">⬅️</button>
  <span id="mesAtualTexto"></span>
  <button onclick="mudarMes(1)">➡️</button>
</div>

<div id="calendario"></div>

<div id="patio">
  <h2>🚨 PÁTIO</h2>
  <div id="alunosErro"></div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-conteudo">
    <span class="fechar" onclick="fecharModal()">X</span>
    <h3 id="tituloDia"></h3>
    <div id="listaModal"></div>
  </div>
</div>

<script>
const URL = "SUA_URL_AQUI";

// ===== VARIÁVEIS GLOBAIS (CORREÇÃO PRINCIPAL) =====
let mesAtual = new Date().getMonth();
let anoAtual = new Date().getFullYear();
let alunosGlobal = [];

// ===== TROCAR MÊS =====
function mudarMes(v){
  mesAtual += v;

  if(mesAtual < 0){ mesAtual = 11; anoAtual--; }
  if(mesAtual > 11){ mesAtual = 0; anoAtual++; }

  gerarCalendario(mesAtual, anoAtual, alunosGlobal);
}

// ===== ATUALIZAR =====
async function atualizarPainel(){
  const res = await fetch(URL);
  const alunos = await res.json();

  alunosGlobal = alunos;

  const agora = new Date();
  document.getElementById("hora").innerText =
    agora.getHours()+":"+String(agora.getMinutes()).padStart(2,"0");

  gerarCalendario(mesAtual, anoAtual, alunosGlobal);
}

// ===== CALENDÁRIO ESTILO WINDOWS =====
function gerarCalendario(mes, ano, dados){
  const cal = document.getElementById("calendario");
  cal.innerHTML = "";

  const meses = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
  document.getElementById("mesAtualTexto").innerText =
    meses[mes]+" / "+ano;

  const diasSemana = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
  diasSemana.forEach(d=>{
    const el = document.createElement("div");
    el.innerHTML = "<b>"+d+"</b>";
    cal.appendChild(el);
  });

  const primeiro = new Date(ano, mes, 1).getDay();
  const totalDias = new Date(ano, mes+1, 0).getDate();

  // espaços vazios (IMPORTANTE)
  for(let i=0;i<primeiro;i++){
    cal.appendChild(document.createElement("div"));
  }

  for(let dia=1; dia<=totalDias; dia++){

    const div = document.createElement("div");
    div.classList.add("dia");

    div.innerHTML = "<b>"+dia+"</b>";

    const alunosDia = dados.filter(a=>{

      // repetir todo mês (DIA FIXO)
      if(a.dia){
        const d = a.dia.split("-")[2];
        if(Number(d) === dia) return true;
      }

      // dias da semana
      if(a.diasSemana){
        const mapa = {DOM:0,SEG:1,TER:2,QUA:3,QUI:4,SEX:5,SAB:6};
        const diaSemana = new Date(ano,mes,dia).getDay();
        return a.diasSemana.split("-").some(x=>mapa[x]===diaSemana);
      }

      return false;
    });

    if(alunosDia.length){
      div.innerHTML += "<br>🎯 "+alunosDia.length;
    }

    div.onclick = ()=>abrirModal(dia, mes, ano, alunosDia);

    cal.appendChild(div);
  }
}

// ===== MODAL =====
function abrirModal(dia, mes, ano, alunos){
  const modal = document.getElementById("modal");
  const lista = document.getElementById("listaModal");

  document.getElementById("tituloDia").innerText =
    dia+"/"+(mes+1)+"/"+ano;

  lista.innerHTML = alunos.map(a=>a.aluno).join("<br>");
  modal.style.display = "flex";
}

function fecharModal(){
  document.getElementById("modal").style.display="none";
}

// ===== INIT =====
atualizarPainel();
setInterval(atualizarPainel, 5000);
</script>

</body>
</html>
