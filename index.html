<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel de Alunos</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5; /* branco */
  color: #111;
}

.area {
  display: inline-block;
  width: 240px;
  height: 200px;
  margin: 10px;
  border: 2px solid #333;
  position: relative;
  border-radius: 10px;
  background: white;
}

.titulo {
  position: absolute;
  top: -20px;
  left: 10px;
  background: #f5f5f5;
  padding: 2px 5px;
  font-weight: bold;
}

.aluno {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  position: absolute;
}

.integral { background: #00cc66; }
.extra { background: #ff9900; }

.horarios {
  position: absolute;
  top: 40px;
  bottom: 5px;
  left: 5px;
  right: 5px;
  font-size: 11px;
  text-align: left;
  overflow-y: auto;
}
</style>
</head>

<body>

<h1>Painel de Alunos</h1>
<p>Atualizado: <span id="hora"></span></p>

<div class="area" id="integral">
  <div class="titulo">Integral</div>
  <div class="horarios" id="hIntegral"></div>
</div>

<div class="area" id="extra">
  <div class="titulo">Extra</div>
  <div class="horarios" id="hExtra"></div>
</div>

<div class="area" id="quadra">
  <div class="titulo">Quadra</div>
  <div class="horarios" id="hQuadra"></div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbwy9dZLj2DgqANdGgrI5YbUhfZkgRY_F3vegXDr1MWSSUrxqJrKhiDV2_RJQi4Ub9_r/exec";

// bolinhas
function gerarAlunos(containerId, quantidade, tipo) {
  const container = document.getElementById(containerId);
  container.querySelectorAll('.aluno').forEach(e => e.remove());

  for (let i = 0; i < quantidade; i++) {
    const aluno = document.createElement('div');
    aluno.classList.add('aluno', tipo);

    aluno.style.left = Math.random() * 200 + "px";
    aluno.style.top = Math.random() * 120 + "px";

    container.appendChild(aluno);
  }
}

async function atualizar() {
  try {
    const resposta = await fetch(URL);
    const dados = await resposta.json();

    let integral = 0;
    let extra = 0;
    let quadra = 0;

    let listaIntegral = [];
    let listaExtra = [];
    let listaQuadra = [];

    dados.forEach(item => {
      const turma = (item.turma || "").toLowerCase().trim();
      const curso = (item.curso || "").toLowerCase().trim();
      const sala  = (item.sala || "").trim();
      const horario = item.horario;

      const texto = sala + " - " + horario;

      if (curso.includes("integral") || turma.includes("integral")) {
        integral++;
        listaIntegral.push(texto);
      }

      if (turma.includes("extra")) {
        extra++;
        listaExtra.push(texto);
      }

      if (sala.toLowerCase().includes("quadra")) {
        quadra++;
        listaQuadra.push(texto);
      }
    });

    // bolinhas
    gerarAlunos("integral", integral, "integral");
    gerarAlunos("extra", extra, "extra");
    gerarAlunos("quadra", quadra, "extra");

    // listas
    document.getElementById("hIntegral").innerHTML =
      listaIntegral.map(i => "• " + i).join("<br>");

    document.getElementById("hExtra").innerHTML =
      listaExtra.map(i => "• " + i).join("<br>");

    document.getElementById("hQuadra").innerHTML =
      listaQuadra.map(i => "• " + i).join("<br>");

    // hora
    const agora = new Date();
    document.getElementById("hora").innerText =
      agora.getHours() + ":" + String(agora.getMinutes()).padStart(2, '0');

  } catch (erro) {
    console.error("Erro API:", erro);
  }
}

// atualizar
setInterval(atualizar, 5000);
atualizar();
</script>

</body>
</html>
